<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VYBEOZA</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#000;color:#fff;font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
.splash{position:fixed;inset:0;background:#000;display:flex;align-items:center;justify-content:center;z-index:999;transition:opacity 0.5s}
.splash img{width:120px;animation:pulse 1s ease-in-out infinite alternate}
@keyframes pulse{from{transform:scale(1)}to{transform:scale(1.1)}}
.auth-wrap{width:100%;max-width:400px;padding:24px}
.logo-area{text-align:center;margin-bottom:32px}
.logo-area img{width:80px;margin-bottom:12px}
.logo-area h1{font-size:28px;font-weight:800;letter-spacing:2px;background:linear-gradient(135deg,#ff6b6b,#ffd93d,#6bcb77,#4d96ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tab-switch{display:flex;background:#111;border-radius:12px;padding:4px;margin-bottom:24px}
.tab-btn{flex:1;padding:10px;border:none;background:none;color:#888;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;transition:all 0.2s}
.tab-btn.active{background:#1a1a1a;color:#fff}
.form-group{margin-bottom:16px}
.form-group input{width:100%;padding:14px 16px;background:#111;border:1px solid #222;border-radius:12px;color:#fff;font-size:15px;outline:none;transition:border 0.2s}
.form-group input:focus{border-color:#4d96ff}
.form-group input::placeholder{color:#555}
.btn-main{width:100%;padding:14px;background:linear-gradient(135deg,#4d96ff,#6bcb77);border:none;border-radius:12px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;margin-top:8px;transition:opacity 0.2s}
.btn-main:hover{opacity:0.9}
.divider{text-align:center;color:#444;margin:16px 0;font-size:13px;position:relative}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:#222}
.divider::before{left:0}.divider::after{right:0}
.btn-social{width:100%;padding:12px;background:#111;border:1px solid #222;border-radius:12px;color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px;transition:background 0.2s}
.btn-social:hover{background:#1a1a1a}
.terms{text-align:center;font-size:11px;color:#444;margin-top:16px;line-height:1.6}
.terms a{color:#4d96ff;text-decoration:none}
.error-msg{color:#ff6b6b;font-size:13px;text-align:center;margin-top:8px;display:none}
</style>
</head>
<body>
<div class="splash" id="splash">
  <img src="logo.png" alt="VYBEOZA" onerror="this.style.display='none';document.getElementById('splash-text').style.display='block'">
  <span id="splash-text" style="display:none;font-size:28px;font-weight:900;letter-spacing:3px;background:linear-gradient(135deg,#ff6b6b,#ffd93d,#6bcb77,#4d96ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent">VYBEOZA</span>
</div>

<div class="auth-wrap">
  <div class="logo-area">
    <img src="logo.png" alt="V" onerror="this.style.display='none'">
    <h1>VYBEOZA</h1>
  </div>

  <div class="tab-switch">
    <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Log In</button>
    <button class="tab-btn" id="tab-signup" onclick="switchTab('signup')">Create Account</button>
  </div>

  <!-- LOGIN FORM -->
  <div id="form-login">
    <div class="form-group">
      <input type="text" id="login-user" placeholder="Username or Email">
    </div>
    <div class="form-group">
      <input type="password" id="login-pass" placeholder="Password">
    </div>
    <div class="error-msg" id="login-error">Invalid username or password</div>
    <button class="btn-main" onclick="doLogin()">Log In</button>
    <div class="divider">or</div>
    <button class="btn-social" onclick="socialLogin('Google')">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.6 2.2 30.1 0 24 0 14.6 0 6.5 5.5 2.5 13.5l7.8 6C12.2 13.4 17.6 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v9h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4 7.1-10 7.1-17.5z"/><path fill="#FBBC05" d="M10.3 28.5c-.6-1.6-.9-3.3-.9-5s.3-3.4.9-5l-7.8-6C.9 15.1 0 19.4 0 24s.9 8.9 2.5 12.5l7.8-6z"/><path fill="#34A853" d="M24 48c6.1 0 11.3-2 15-5.4l-7.5-5.8c-2 1.4-4.6 2.2-7.5 2.2-6.4 0-11.8-3.9-13.7-9.5l-7.8 6C6.5 42.5 14.6 48 24 48z"/></svg>
      Continue with Google
    </button>
    <button class="btn-social" onclick="socialLogin('Apple')">
      <svg width="18" height="18" viewBox="0 0 814 1000" fill="white"><path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105-57.8-155.5-127.4C46 790.7 0 663 0 541.8c0-207.1 135.4-316.5 269-316.5 71 0 130.5 46.4 175 46.4 42.5 0 109.2-49 192.8-49 31.2 0 108.2 2.6 168.7 98.3zm-234-181.5c31.1-36.9 53.1-88.1 53.1-139.3 0-7.1-.6-14.3-1.9-20.1-50.6 1.9-110.8 33.7-147.1 75.8-28.5 32.4-55.1 83.6-55.1 135.5 0 7.8 1.3 15.6 1.9 18.1 3.2.6 8.4 1.3 13.6 1.3 45.4 0 102.5-30.4 135.5-71.3z"/></svg>
      Continue with Apple
    </button>
    <div class="terms">By logging in you agree to our <a href="#">Terms</a> & <a href="#">Privacy Policy</a></div>
  </div>

  <!-- SIGNUP FORM -->
  <div id="form-signup" style="display:none">
    <div class="form-group">
      <input type="text" id="signup-name" placeholder="Full Name">
    </div>
    <div class="form-group">
      <input type="text" id="signup-username" placeholder="Username (e.g. @vybeoza)">
    </div>
    <div class="form-group">
      <input type="email" id="signup-email" placeholder="Email Address">
    </div>
    <div class="form-group">
      <input type="password" id="signup-pass" placeholder="Password (min 6 chars)">
    </div>
    <div class="error-msg" id="signup-error">Please fill all fields correctly</div>
    <button class="btn-main" onclick="doSignup()">Create Account</button>
    <div class="divider">or</div>
    <button class="btn-social" onclick="socialLogin('Google')">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.6 2.2 30.1 0 24 0 14.6 0 6.5 5.5 2.5 13.5l7.8 6C12.2 13.4 17.6 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v9h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4 7.1-10 7.1-17.5z"/><path fill="#FBBC05" d="M10.3 28.5c-.6-1.6-.9-3.3-.9-5l-7.8-6C.9 15.1 0 19.4 0 24s.9 8.9 2.5 12.5l7.8-6z"/><path fill="#34A853" d="M24 48c6.1 0 11.3-2 15-5.4l-7.5-5.8c-2 1.4-4.6 2.2-7.5 2.2-6.4 0-11.8-3.9-13.7-9.5l-7.8 6C6.5 42.5 14.6 48 24 48z"/></svg>
      Continue with Google
    </button>
    <div class="terms">By signing up you agree to our <a href="#">Terms</a> & <a href="#">Privacy Policy</a></div>
  </div>
</div>

<script>
// Check if already logged in
(function(){
  var u = localStorage.getItem('vybeoza_user');
  if(u){ window.location.href = 'flash.html'; }
})();

setTimeout(function(){
  var s = document.getElementById('splash');
  s.style.opacity = '0';
  setTimeout(function(){ s.style.display = 'none'; }, 500);
}, 2000);

function switchTab(tab){
  document.getElementById('form-login').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('form-signup').style.display = tab === 'signup' ? 'block' : 'none';
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
}

function doLogin(){
  var user = document.getElementById('login-user').value.trim();
  var pass = document.getElementById('login-pass').value.trim();
  var err = document.getElementById('login-error');
  if(!user || !pass){ err.style.display = 'block'; err.textContent = 'Please fill all fields'; return; }
  var saved = JSON.parse(localStorage.getItem('vybeoza_accounts') || '[]');
  var found = saved.find(function(a){ return (a.username === user || a.email === user) && a.password === pass; });
  if(!found){ err.style.display = 'block'; err.textContent = 'Invalid username or password'; return; }
  localStorage.setItem('vybeoza_user', JSON.stringify(found));
  window.location.href = 'flash.html';
}

function doSignup(){
  var name = document.getElementById('signup-name').value.trim();
  var username = document.getElementById('signup-username').value.trim().replace('@','');
  var email = document.getElementById('signup-email').value.trim();
  var pass = document.getElementById('signup-pass').value.trim();
  var err = document.getElementById('signup-error');
  if(!name || !username || !email || !pass){ err.style.display = 'block'; err.textContent = 'Please fill all fields'; return; }
  if(pass.length < 6){ err.style.display = 'block'; err.textContent = 'Password must be at least 6 characters'; return; }
  var accounts = JSON.parse(localStorage.getItem('vybeoza_accounts') || '[]');
  var exists = accounts.find(function(a){ return a.username === username || a.email === email; });
  if(exists){ err.style.display = 'block'; err.textContent = 'Username or email already exists'; return; }
  var newUser = {name:name, username:username, email:email, password:pass, avatar:'', vibers:0, vibing:0, joined: new Date().toISOString()};
  accounts.push(newUser);
  localStorage.setItem('vybeoza_accounts', JSON.stringify(accounts));
  localStorage.setItem('vybeoza_user', JSON.stringify(newUser));
  window.location.href = 'flash.html';
}

function socialLogin(provider){
  var demoUser = {name:'VYBEOZA User', username:'vybeozauser', email:'user@vybeoza.com', password:'demo123', avatar:'', vibers:0, vibing:0, joined: new Date().toISOString(), provider: provider};
  localStorage.setItem('vybeoza_user', JSON.stringify(demoUser));
  window.location.href = 'flash.html';
}
</script>
</body>
</html>
