<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VYBEOZA — New Post</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0a;--bg2:#111;--bg3:#1a1a1a;--bg4:#242424;--accent:#ff2d78;--accent2:#00f0c8;--accent3:#a259ff;--text:#fff;--text2:#ccc;--muted:#777;--border:#272727;--font:"DM Sans",sans-serif;--brand:"Syne",sans-serif;}
html,body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100%}
button,input,textarea,select{font-family:var(--font)}
.topbar{position:sticky;top:0;height:56px;display:flex;align-items:center;gap:10px;padding:0 16px;border-bottom:1px solid var(--border);background:var(--bg);z-index:50}
.back-btn{background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;padding:4px 10px 4px 0}
.page-title{font-family:var(--brand);font-size:20px;font-weight:700;flex:1}
.body{max-width:600px;margin:0 auto;padding:20px 16px}
.type-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
.type-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:20px 14px;text-align:center;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.type-card:hover{border-color:var(--accent);background:#ff2d780d}
.type-card.on{border-color:var(--accent);background:#ff2d780d}
.type-ico{font-size:30px;display:block;margin-bottom:8px}
.type-name{font-size:14px;font-weight:600}
.type-desc{font-size:11px;color:var(--muted);margin-top:3px}
.file-inp{position:absolute;inset:0;opacity:0;cursor:pointer}
.preview-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:16px;display:none;align-items:center;gap:10px}
.preview-box.show{display:flex}
.preview-ico{font-size:24px;flex-shrink:0}
.preview-name{font-size:13px;color:var(--accent2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.preview-size{font-size:11px;color:var(--muted)}
.remove-btn{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer}
.inp{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:13px 16px;color:var(--text);font-size:14px;outline:none;transition:border .2s;margin-bottom:12px}
.inp:focus{border-color:var(--accent3)}
.inp::placeholder{color:var(--muted)}
textarea.inp{resize:none;min-height:100px;line-height:1.6}
.row{display:flex;gap:8px;margin-bottom:12px}
.tag-btn{background:var(--bg3);border:1px solid var(--border);color:var(--muted);padding:8px 14px;border-radius:20px;font-size:12px;cursor:pointer;transition:all .2s}
.tag-btn:hover{border-color:var(--accent3);color:var(--text)}
.post-btn{width:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border:none;color:#fff;padding:14px;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .2s;margin-top:8px}
.post-btn:hover{opacity:.88}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e1e1e;border:1px solid var(--border);padding:8px 20px;border-radius:20px;font-size:12px;opacity:0;transition:.3s;white-space:nowrap;pointer-events:none;z-index:9999}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="topbar">
  <button class="back-btn" onclick="location.href='Flash.html'">←</button>
  <div class="page-title">New Post</div>
</div>
<div class="body">
  <div class="type-grid">
    <div class="type-card" id="tc-viso" onclick="selectType('viso')">
      <span class="type-ico">🎬</span>
      <div class="type-name">VISO</div>
      <div class="type-desc">Photo or video post</div>
      <input class="file-inp" type="file" accept="image/*,video/*" onchange="fileSelected(this,'VISO')">
    </div>
    <div class="type-card" id="tc-flow" onclick="selectType('flow')">
      <span class="type-ico">📽️</span>
      <div class="type-name">Flow</div>
      <div class="type-desc">Short reel video</div>
      <input class="file-inp" type="file" accept="video/*" onchange="fileSelected(this,'Flow')">
    </div>
    <div class="type-card" id="tc-prefo" onclick="window.location.href='camera.html'">
      <span class="type-ico">✨</span>
      <div class="type-name">Prefo</div>
      <div class="type-desc">24h story</div>
    </div>
    <div class="type-card" id="tc-live" onclick="goLive()">
      <span class="type-ico">🔴</span>
      <div class="type-name">Go Live</div>
      <div class="type-desc">Live stream now</div>
    </div>
  </div>

  <div class="preview-box" id="preview-box">
    <div class="preview-ico" id="preview-ico">🎬</div>
    <div>
      <div class="preview-name" id="preview-name"></div>
      <div class="preview-size" id="preview-size"></div>
    </div>
    <button class="remove-btn" onclick="removeFile()">✕</button>
  </div>

  <textarea class="inp" id="caption" placeholder="Write a caption... Share the vibe 🎯" rows="4"></textarea>
  <div class="row">
    <button class="tag-btn" onclick="toast('Location added!')">📍 Location</button>
    <button class="tag-btn" onclick="toast('Tag added!')"># Hashtag</button>
    <button class="tag-btn" onclick="toast('People tagged!')">👥 Tag People</button>
    <button class="tag-btn" onclick="toast('Audience set!')">🌐 Audience</button>
  </div>
  <button class="post-btn" onclick="submitPost()">Post to VYBEOZA →</button>
</div>
<div class="toast" id="toast"></div>
<script>
if(localStorage.getItem("vybeoza_logged_in") !== "true") window.location.href = "index.html";
function toast(t){ var x=document.getElementById("toast"); x.textContent=t; x.classList.add("show"); clearTimeout(window._tt); window._tt=setTimeout(function(){ x.classList.remove("show"); },1600); }
var selectedType = null;
function selectType(type){ selectedType = type; document.querySelectorAll(".type-card").forEach(function(c){ c.classList.remove("on"); }); document.getElementById("tc-"+type).classList.add("on"); }
function fileSelected(inp, type){
  var f = inp.files[0]; if(!f) return;
  selectType(type.toLowerCase());
  document.getElementById("preview-box").classList.add("show");
  document.getElementById("preview-ico").textContent = type==="VISO" ? "🎬" : "📽️";
  document.getElementById("preview-name").textContent = f.name;
  document.getElementById("preview-size").textContent = (f.size/1024/1024).toFixed(2) + " MB";
  toast(type + " selected: " + f.name);
}
function removeFile(){ document.getElementById("preview-box").classList.remove("show"); document.querySelectorAll(".type-card").forEach(function(c){ c.classList.remove("on"); }); selectedType = null; }
function goLive(){ toast("Starting live stream..."); setTimeout(function(){ alert("Live streaming coming soon!"); }, 500); }
function submitPost(){
  var caption = document.getElementById("caption").value.trim();
  if(!selectedType){ toast("Please select a post type first!"); return; }
  toast("Posting... 🚀");
  setTimeout(function(){ window.location.href = "Flash.html"; }, 1500);
}
</script>
</body>
