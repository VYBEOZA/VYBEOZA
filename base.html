<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VYBEOZA — Base</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0a;--bg2:#111;--bg3:#1a1a1a;--bg4:#242424;--accent:#ff2d78;--accent2:#00f0c8;--accent3:#a259ff;--text:#fff;--text2:#ccc;--muted:#777;--border:#272727;--font:"DM Sans",sans-serif;--brand:"Syne",sans-serif;}
html,body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100%}
button,input{font-family:var(--font)}

.topbar{position:sticky;top:0;height:56px;display:flex;align-items:center;gap:10px;padding:0 16px;border-bottom:1px solid var(--border);background:var(--bg);z-index:50}
.back-btn{background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;padding:4px 10px 4px 0}
.page-title{font-family:var(--brand);font-size:20px;font-weight:700;flex:1}
.icon-btn{background:none;border:none;color:var(--muted);width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;transition:all .2s}
.icon-btn:hover{background:var(--bg3);color:var(--text)}

/* Desktop layout */
.profile-wrap{max-width:960px;margin:0 auto;padding:32px 24px}
.profile-layout{display:flex;gap:48px}
.left{width:280px;flex-shrink:0}
.right{flex:1;min-width:0}

/* Avatar */
.av-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:18px}
.av-ring{width:96px;height:96px;border-radius:50%;padding:3px;background:linear-gradient(135deg,var(--accent),var(--accent3),var(--accent2))}
.av-inner{width:100%;height:100%;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:34px;border:3px solid var(--bg)}
.uname{font-size:20px;font-weight:700}
.handle{font-size:13px;color:var(--muted)}
.priv-btn{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid;margin-top:4px;transition:all .2s;background:none}
.priv-btn.pub{border-color:var(--accent2);color:var(--accent2)}
.priv-btn.priv{border-color:var(--accent3);color:var(--accent3)}

/* Stats */
.stats{display:flex;border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:14px 0;margin:14px 0}
.stat{flex:1;text-align:center;border-right:1px solid var(--border)}
.stat:last-child{border:none}
.stat-num{font-family:var(--brand);font-size:19px;font-weight:700}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}

.bio{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:14px}
.act-row{display:flex;gap:8px;margin-bottom:12px}
.act-btn{flex:1;padding:9px;border-radius:10px;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;border:1px solid var(--border);background:var(--bg2);color:var(--text)}
.act-btn:hover{border-color:var(--accent);color:var(--accent)}
.act-btn.pri{background:linear-gradient(90deg,var(--accent),var(--accent3));border:none;color:#fff}

/* 3 dot menu */
.opts-wrap{position:relative;margin-bottom:12px}
.opts-btn{width:100%;background:var(--bg2);border:1px solid var(--border);color:var(--text2);padding:9px;border-radius:10px;font-size:13px;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;transition:border .2s}
.opts-btn:hover{border-color:var(--accent3)}
.opts-menu{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden;z-index:30;box-shadow:0 8px 32px rgba(0,0,0,.6);display:none}
.opts-menu.open{display:block}
.opt{display:flex;align-items:center;gap:12px;padding:12px 16px;font-size:13px;cursor:pointer;border:none;background:none;color:var(--text);width:100%;text-align:left;transition:background .15s}
.opt:hover{background:var(--bg3)}
.opt.red{color:#ff6b6b}
.opt-sep{height:1px;background:var(--border)}

/* Tabs + Grid */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:14px}
.tab{flex:1;padding:12px 4px;font-size:12px;text-align:center;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;border:none;background:none;font-family:var(--font);font-weight:500;transition:all .2s}
.tab.on{color:var(--text);border-bottom-color:var(--accent)}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px}
.gcell{aspect-ratio:1;background:var(--bg3);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--bg4);cursor:pointer;position:relative;overflow:hidden;transition:opacity .2s}
.gcell:hover{opacity:.8}
.gcell-ov{position:absolute;inset:0;background:linear-gradient(135deg,#ff2d7812,#a259ff12)}

/* History */
.h-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.h-item:hover{background:var(--bg2)}
.h-thumb{width:72px;height:50px;background:var(--bg3);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--muted);flex-shrink:0}
.h-title{font-size:13px;font-weight:500}
.h-time{font-size:11px;color:var(--muted);margin-top:2px}

.tab-content{display:none}
.tab-content.on{display:block}

.bnav{display:none;position:fixed;bottom:0;left:0;right:0;justify-content:space-around;align-items:center;height:60px;border-top:1px solid var(--border);background:var(--bg)}
.bn-btn{background:none;border:none;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 10px;cursor:pointer;transition:color .2s}
.bn-btn.active{color:var(--accent)}
.bn-ico{font-size:20px;line-height:1}
.bn-lbl{font-size:8px;letter-spacing:.5px;text-transform:uppercase;font-weight:500}
.bn-fab{width:44px;height:44px;background:linear-gradient(135deg,var(--accent),var(--accent3));border:none;border-radius:50%;color:#fff;font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);background:#1e1e1e;border:1px solid var(--border);padding:8px 20px;border-radius:20px;font-size:12px;opacity:0;transition:.3s;white-space:nowrap;pointer-events:none;z-index:9999}
.toast.show{opacity:1}
@media(max-width:768px){
  .bnav{display:flex}
  body{padding-bottom:60px}
  .profile-layout{flex-direction:column}
  .left{width:100%}
  .profile-wrap{padding:16px}
}
</style>
</head>
<body>
<div class="topbar">
  <button class="back-btn" onclick="window.location.href='Flash.html'">←</button>
  <div class="page-title">Your Base</div>
  <button class="icon-btn" onclick="window.location.href='settings.html'">⚙️</button>
</div>

<div class="profile-wrap">
  <div class="profile-layout">
    <!-- LEFT -->
    <div class="left">
      <div class="av-wrap">
        <div class="av-ring"><div class="av-inner">🎭</div></div>
        <div class="uname">Your Base</div>
        <div class="handle">@your_handle</div>
        <button class="priv-btn pub" id="priv-btn" onclick="togglePrivacy()">🌐 Public</button>
      </div>
      <div class="stats">
        <div class="stat"><div class="stat-num">142</div><div class="stat-lbl">VISOs</div></div>
        <div class="stat"><div class="stat-num">8.4K</div><div class="stat-lbl">Vibers</div></div>
        <div class="stat"><div class="stat-num">312</div><div class="stat-lbl">Vibing</div></div>
        <div class="stat"><div class="stat-num">94K</div><div class="stat-lbl">Vibes</div></div>
      </div>
      <div class="bio">Spreading good vibes on VYBEOZA ✨ Creating content that hits different 🎯 Varanasi 📍</div>
      <div class="act-row">
        <button class="act-btn pri" onclick="toast('Edit Base')">Edit Base</button>
        <button class="act-btn" onclick="shareProfile()">Share</button>
        <button class="act-btn" onclick="toast('Boost!')">Boost</button>
      </div>
      <div class="opts-wrap">
        <button class="opts-btn" onclick="toggleOpts()">⋯ More Options</button>
        <div class="opts-menu" id="opts-menu">
          <button class="opt" onclick="window.location.href='settings.html'">⚙️ Settings & Privacy</button>
          <button class="opt" onclick="switchTab('history');closeOpts()">🕐 History</button>
          <button class="opt" onclick="toast('QR Code');closeOpts()">📷 QR Code</button>
          <button class="opt" onclick="toast('Your Activity');closeOpts()">📊 Your Activity</button>
          <button class="opt" onclick="toast('Archive');closeOpts()">📦 Archive</button>
          <div class="opt-sep"></div>
          <button class="opt red" onclick="doLogout()">🚪 Log Out</button>
        </div>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="right">
      <div class="tabs">
        <button class="tab on" id="tab-visos" onclick="switchTab('visos')">VISOs</button>
        <button class="tab" id="tab-flow" onclick="switchTab('flow')">Flow</button>
        <button class="tab" id="tab-saved" onclick="switchTab('saved')">Saved</button>
        <button class="tab" id="tab-history" onclick="switchTab('history')">History</button>
      </div>
      <div class="tab-content on" id="tc-visos"><div class="grid" id="visos-grid"></div></div>
      <div class="tab-content" id="tc-flow"><div class="grid" id="flow-grid"></div></div>
      <div class="tab-content" id="tc-saved"><div class="grid" id="saved-grid"></div></div>
      <div class="tab-content" id="tc-history" id="history-list"></div>
    </div>
  </div>
</div>

<div class="bnav">
  <button class="bn-btn" onclick="window.location.href='Flash.html'"><span class="bn-ico">🏡</span><span class="bn-lbl">Flash</span></button>
  <button class="bn-btn" onclick="window.location.href='flow.html'"><span class="bn-ico">📽️</span><span class="bn-lbl">Flow</span></button>
  <button class="bn-fab" onclick="window.location.href='post.html'">＋</button>
  <button class="bn-btn" onclick="window.location.href='hypo.html'"><span class="bn-ico">💬</span><span class="bn-lbl">Hypo</span></button>
  <button class="bn-btn active"><span class="bn-ico">👤</span><span class="bn-lbl">Base</span></button>
</div>
<div class="toast" id="toast"></div>

<script>
if(localStorage.getItem("vybeoza_logged_in") !== "true") window.location.href = "index.html";
function toast(t){ var x=document.getElementById("toast"); x.textContent=t; x.classList.add("show"); clearTimeout(window._tt); window._tt=setTimeout(function(){ x.classList.remove("show"); },1600); }
function doLogout(){ localStorage.removeItem("vybeoza_logged_in"); window.location.href="index.html"; }
function toggleOpts(){ document.getElementById("opts-menu").classList.toggle("open"); }
function closeOpts(){ document.getElementById("opts-menu").classList.remove("open"); }
document.addEventListener("click", function(e){ if(!e.target.closest(".opts-wrap")) closeOpts(); });

var isPublic = true;
function togglePrivacy(){
  isPublic = !isPublic;
  var btn = document.getElementById("priv-btn");
  btn.textContent = isPublic ? "🌐 Public" : "🔒 Private";
  btn.className = "priv-btn " + (isPublic ? "pub" : "priv");
  toast(isPublic ? "Account is now Public" : "Account is now Private");
}

function switchTab(name){
  document.querySelectorAll(".tab").forEach(function(t){ t.classList.remove("on"); });
  document.querySelectorAll(".tab-content").forEach(function(t){ t.classList.remove("on"); });
  document.getElementById("tab-" + name).classList.add("on");
  document.getElementById("tc-" + name).classList.add("on");
}

// Build grids
var g = document.getElementById("visos-grid");
for(var i=0; i<15; i++){
  g.innerHTML += '<div class="gcell" onclick="toast(\'VISO ' + (i+1) + '\')"><div class="gcell-ov"></div>VISO ' + (i+1) + '</div>';
}
var gf = document.getElementById("flow-grid");
for(var i=0; i<9; i++){
  gf.innerHTML += '<div class="gcell" onclick="toast(\'Flow ' + (i+1) + '\')"><div class="gcell-ov"></div>Flow ' + (i+1) + '</div>';
}
var gs = document.getElementById("saved-grid");
for(var i=0; i<6; i++){
  gs.innerHTML += '<div class="gcell" onclick="toast(\'Saved ' + (i+1) + '\')"><div class="gcell-ov" style="background:linear-gradient(135deg,#00f0c812,#a259ff12)"></div>Saved ' + (i+1) + '</div>';
}

// History
var hl = document.getElementById("tc-history");
var hist = ["Krishna — Sunrise Session","Riya — Digital Art Flow","Suryansh — Gaming Highlight","Dev — Startup Vlog","Meera — Aesthetic Morning","Arnav — Beach Day VISO"];
var htimes = ["Today","Yesterday","2 days ago","3 days ago","Last week","Last week"];
hist.forEach(function(h, i){
  hl.innerHTML += '<div class="h-item" onclick="toast(\'Playing...\')"><div class="h-thumb">VISO ' + (i+1) + '</div><div><div class="h-title">' + h + '</div><div class="h-time">' + htimes[i] + '</div></div></div>';
});

function shareProfile(){
  if(navigator.share){
    navigator.share({title:"VYBEOZA — Your Base", url: window.location.href});
  } else {
    navigator.clipboard.writeText("https://vybeoza.app/@your_handle").then(function(){ toast("Profile link copied! 📋"); });
  }
}

// Handle tab from URL
var urlParams = new URLSearchParams(window.location.search);
var tabParam = urlParams.get('tab');
if(tabParam){
  var validTabs = {'history':'history','saved':'saved','playlist':'visos','monetization':'visos'};
  var t = validTabs[tabParam] || tabParam;
  if(document.getElementById('tab-'+t)) switchTab(t);
  else if(tabParam === 'playlist'){ toast('Playlists coming soon!'); }
  else if(tabParam === 'monetization'){ toast('Monetization Dashboard coming soon!'); }
}
</script>
</body>
</html>
