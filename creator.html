<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>VYBEOZA - Creator Center</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0a;--bg2:#111;--bg3:#1a1a1a;--bg4:#242424;--accent:#ff2d78;--accent2:#00f0c8;--accent3:#a259ff;--text:#fff;--text2:#ccc;--muted:#777;--border:#272727;--font:"DM Sans",sans-serif;--brand:"Syne",sans-serif}
html,body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh}
button{font-family:var(--font);cursor:pointer}
.topbar{position:sticky;top:0;height:52px;background:var(--bg);display:flex;align-items:center;padding:0 14px;gap:10px;z-index:50;border-bottom:1px solid var(--border)}
.back-btn{background:none;border:none;color:var(--text);font-size:20px;padding:4px 8px 4px 0}
.topbar h2{font-family:var(--brand);font-size:18px;font-weight:700;flex:1;background:linear-gradient(90deg,#ff2d78,#a259ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.inner{max-width:960px;margin:0 auto;padding:16px;padding-bottom:80px}
.cc-sub{font-size:12px;color:var(--muted);margin-bottom:20px}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
@media(max-width:600px){.stats-grid{grid-template-columns:repeat(2,1fr)}}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px}
.stat-num{font-family:var(--brand);font-size:22px;font-weight:700;color:var(--accent)}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:3px}
.stat-change{font-size:10px;color:var(--accent2);margin-top:4px}

/* SECTIONS */
.sections{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:600px){.sections{grid-template-columns:1fr}}
.cc-section{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px}
.cc-sec-title{font-size:13px;font-weight:600;margin-bottom:12px}

/* VIDEOS LIST */
.vid-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer}
.vid-item:last-of-type{border:none}
.vid-thumb{width:64px;height:42px;background:var(--bg3);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;position:relative;overflow:hidden}
.vid-thumb-bg{position:absolute;inset:0;opacity:.4}
.vid-info{flex:1;min-width:0}
.vid-title{font-size:12px;font-weight:500;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
.vid-stats{font-size:10px;color:var(--muted);margin-top:2px}
.vid-acts{display:flex;gap:4px;flex-shrink:0}
.vid-act-btn{background:var(--bg3);border:none;color:var(--text2);padding:4px 8px;border-radius:6px;font-size:10px;transition:all .2s}
.vid-act-btn:hover{background:var(--bg4);color:var(--text)}

/* ANALYTICS */
.insight-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px}
.insight-row:last-child{border:none}
.insight-val{font-weight:600;color:var(--accent2)}

/* MONETIZATION */
.prog-wrap{margin-bottom:10px}
.prog-label{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:4px}
.prog-val{color:var(--accent);font-weight:600}
.prog-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:3px;transition:width 1s}
.prog-fill.green{background:var(--accent2)}

/* QUICK ACTIONS */
.quick-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:9px 14px;border-radius:10px;font-size:12px;display:flex;align-items:center;gap:7px;margin:4px;transition:all .2s;cursor:pointer}
.quick-btn:hover{border-color:var(--accent);color:var(--accent)}
.quick-btns-wrap{display:flex;flex-wrap:wrap;margin:-4px}

/* UPLOAD BTN */
.upload-btn{width:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border:none;color:#fff;padding:11px;border-radius:10px;font-size:13px;font-weight:600;margin-top:10px;transition:opacity .2s}
.upload-btn:hover{opacity:.88}

.bnav{display:none;position:fixed;bottom:0;left:0;right:0;height:56px;background:var(--bg);border-top:1px solid var(--border);z-index:100;justify-content:space-around;align-items:center}
.bn-btn{background:none;border:none;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 8px;text-decoration:none}
.bn-ico{font-size:19px;line-height:1}
.bn-lbl{font-size:7px;letter-spacing:.5px;text-transform:uppercase;font-weight:500}
.bn-fab{width:42px;height:42px;background:linear-gradient(135deg,var(--accent),var(--accent3));border:none;border-radius:50%;color:#fff;font-size:20px;display:flex;align-items:center;justify-content:center}
.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:#1e1e1e;border:1px solid var(--border);padding:7px 18px;border-radius:18px;font-size:12px;opacity:0;transition:.3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1}
@media(max-width:768px){.bnav{display:flex}}
</style>
</head>
<body>
<div class="topbar">
  <button class="back-btn" onclick="history.back()">←</button>
  <h2>Creator Center</h2>
</div>
<div class="inner">
  <div class="cc-sub">Manage your content, track performance & earn 💰</div>

  <!-- STATS -->
  <div class="stats-grid" id="stats-grid"></div>

  <!-- SECTIONS -->
  <div class="sections">
    <!-- YOUR VISOS -->
    <div class="cc-section">
      <div class="cc-sec-title">📹 Your VISOs</div>
      <div id="visos-list"></div>
      <button class="upload-btn" onclick="window.location.href='post.html'">+ Upload New VISO</button>
    </div>

    <!-- ANALYTICS -->
    <div class="cc-section">
      <div class="cc-sec-title">📊 Analytics</div>
      <div id="analytics-list"></div>
    </div>

    <!-- MONETIZATION -->
    <div class="cc-section">
      <div class="cc-sec-title">💰 Monetization Status</div>
      <div id="monetize-section"></div>
    </div>

    <!-- QUICK ACTIONS -->
    <div class="cc-section">
      <div class="cc-sec-title">⚡ Quick Actions</div>
      <div class="quick-btns-wrap" id="quick-btns"></div>
    </div>
  </div>
</div>

<div class="bnav">
  <a class="bn-btn" href="flash.html"><span class="bn-ico">🏡</span><span class="bn-lbl">Flash</span></a>
  <a class="bn-btn" href="flow.html"><span class="bn-ico">📽️</span><span class="bn-lbl">Flow</span></a>
  <a class="bn-btn" href="post.html"><div class="bn-fab">＋</div></a>
  <a class="bn-btn" href="hypo.html"><span class="bn-ico">💬</span><span class="bn-lbl">Hypo</span></a>
  <a class="bn-btn" href="base.html"><span class="bn-ico">👤</span><span class="bn-lbl">Base</span></a>
</div>
<div class="toast" id="toast"></div>

<script>
var user=null; try{user=JSON.parse(localStorage.getItem('vyb_user'));}catch(e){} if(!user)window.location.href='index.html';
function toast(msg){var el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(window._tt);window._tt=setTimeout(function(){el.classList.remove('show');},1800);}

var GRADS=['linear-gradient(135deg,#ff2d78,#a259ff)','linear-gradient(135deg,#00f0c8,#a259ff)','linear-gradient(135deg,#ff2d78,#00f0c8)','linear-gradient(45deg,#a259ff,#ff2d78)','linear-gradient(90deg,#00f0c8,#ff2d78)'];
var TITLES=['That feeling when the vibe hits just right ✨','Best moments with the crew 🔥','New day new VISO 🎯','Real talk: life is a vibe 💫','Creating something special 🎪'];
var EMOJIS=['✨','🔥','🎯','💫','🎪'];

// STATS
var statsData=[
  {num:'4,200',lbl:'Watch Hours',change:'↑ +420 this month',color:'var(--accent)'},
  {num:'8,412',lbl:'Total Vibers',change:'↑ +1,230 this month',color:'var(--accent2)'},
  {num:'2.4M',lbl:'Total Views',change:'↑ +340K this month',color:'var(--accent3)'},
  {num:'₹0',lbl:'Earnings',change:'Need Vybee Button',color:'var(--muted)'}
];
var sg=document.getElementById('stats-grid');
statsData.forEach(function(s){
  var el=document.createElement('div'); el.className='stat-card';
  el.innerHTML='<div class="stat-num" style="color:'+s.color+'">'+s.num+'</div><div class="stat-lbl">'+s.lbl+'</div><div class="stat-change">'+s.change+'</div>';
  sg.appendChild(el);
});

// VISOS
var vl=document.getElementById('visos-list');
TITLES.forEach(function(t,i){
  var item=document.createElement('div'); item.className='vid-item';
  var views=(Math.random()*200+10).toFixed(0)+'K';
  var vibes=Math.floor(Math.random()*500+20);
  item.innerHTML='<div class="vid-thumb"><div class="vid-thumb-bg" style="background:'+GRADS[i%GRADS.length]+'"></div>'+EMOJIS[i]+'</div>'
    +'<div class="vid-info"><div class="vid-title">'+t+'</div><div class="vid-stats">'+views+' views · '+vibes+' vibes</div></div>'
    +'<div class="vid-acts">'
    +'<button class="vid-act-btn" onclick="toast(\'Edit VISO\')">✏️</button>'
    +'<button class="vid-act-btn" onclick="toast(\'Analytics\')">📊</button>'
    +'<button class="vid-act-btn" onclick="if(confirm(\'Delete?\'))toast(\'Deleted!\')">🗑️</button>'
    +'</div>';
  (function(ii){item.onclick=function(e){if(!e.target.closest('.vid-acts')){localStorage.setItem('vyb_cur',ii);window.location.href='watch.html';}};})(i);
  vl.appendChild(item);
});

// ANALYTICS
var analyticsData=[
  {lbl:'Avg. Watch Time',val:'4:32'},
  {lbl:'Click Through Rate',val:'8.4%'},
  {lbl:'Vibers Growth',val:'+14.6%'},
  {lbl:'Top Content Type',val:'Vlog'},
  {lbl:'Peak Hours',val:'8PM–11PM'},
  {lbl:'Top Location',val:'Varanasi, UP'},
  {lbl:'Impressions',val:'1.2M'},
  {lbl:'Engagement Rate',val:'12.3%'}
];
var al=document.getElementById('analytics-list');
analyticsData.forEach(function(r){
  var row=document.createElement('div'); row.className='insight-row';
  row.innerHTML='<span>'+r.lbl+'</span><span class="insight-val">'+r.val+'</span>';
  al.appendChild(row);
});

// MONETIZATION
var ms=document.getElementById('monetize-section');
ms.innerHTML='<div class="prog-wrap">'
  +'<div class="prog-label"><span>Watch Hours</span><span class="prog-val">4,200 / 5,000</span></div>'
  +'<div class="prog-bar"><div class="prog-fill" style="width:84%"></div></div>'
  +'</div>'
  +'<div class="prog-wrap">'
  +'<div class="prog-label"><span>Vibers</span><span style="color:var(--accent2);font-weight:600">8,412 / 1,500 ✓</span></div>'
  +'<div class="prog-bar"><div class="prog-fill green" style="width:100%"></div></div>'
  +'</div>'
  +'<div style="font-size:12px;color:var(--muted);margin:10px 0">800 more watch hours needed for Vybee Button!</div>'
  +'<button onclick="window.location.href=\'settings.html\'" style="width:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border:none;color:#fff;padding:10px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer">View Monetization Rules</button>';

// QUICK ACTIONS
var quickData=[
  {ico:'📹',txt:'Upload VISO',fn:function(){window.location.href='post.html';}},
  {ico:'📊',txt:'Full Analytics',fn:function(){toast('Full analytics coming soon!');}},
  {ico:'💬',txt:'View Comments',fn:function(){toast('Comments coming soon!');}},
  {ico:'🎯',txt:'Run Ad Campaign',fn:function(){toast('Ad campaigns coming soon!');}},
  {ico:'📣',txt:'Announcements',fn:function(){toast('Community posts coming soon!');}},
  {ico:'🎁',txt:'Creator Events',fn:function(){toast('Events coming soon!');}},
  {ico:'💰',txt:'Earnings',fn:function(){toast('Need Vybee Button first!');}},
  {ico:'⚡',txt:'PowerChat',fn:function(){toast('Available after monetization!');}}
];
var qb=document.getElementById('quick-btns');
quickData.forEach(function(q){
  var btn=document.createElement('button'); btn.className='quick-btn';
  btn.innerHTML='<span>'+q.ico+'</span>'+q.txt;
  btn.onclick=q.fn;
  qb.appendChild(btn);
});
</script>
</body>
</html>
