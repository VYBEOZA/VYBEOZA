<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VYBEOZA - Hypo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f0f0f;color:#fff;font-family:'Segoe UI',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* TOPBAR */
.topbar{height:56px;background:#0f0f0f;display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;border-bottom:1px solid #1a1a1a}
.topbar h2{font-size:18px;font-weight:700;flex:1}
.icon-btn{width:36px;height:36px;border:none;background:none;color:#fff;cursor:pointer;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px}
.icon-btn:hover{background:#1a1a1a}

/* TABS */
.tabs{display:flex;border-bottom:1px solid #1a1a1a;flex-shrink:0}
.tab{flex:1;padding:12px;text-align:center;cursor:pointer;font-size:13px;font-weight:600;color:#888;border-bottom:2px solid transparent;transition:all 0.2s}
.tab.active{color:#4d96ff;border-bottom-color:#4d96ff}

/* CHAT LIST */
.chat-list{flex:1;overflow-y:auto}
.chat-list::-webkit-scrollbar{width:4px}
.chat-list::-webkit-scrollbar-thumb{background:#333}
.chat-item{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;border-bottom:1px solid #111;transition:background 0.2s;position:relative}
.chat-item:hover{background:#111}
.chat-avatar{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#ff6b6b,#4d96ff);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;position:relative}
.online-dot{position:absolute;bottom:2px;right:2px;width:12px;height:12px;background:#6bcb77;border-radius:50%;border:2px solid #0f0f0f}
.chat-info{flex:1;min-width:0}
.chat-name{font-size:14px;font-weight:600;margin-bottom:2px}
.chat-last{font-size:12px;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.chat-time{font-size:11px;color:#888}
.chat-badge{width:20px;height:20px;background:#25d366;border-radius:50%;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;color:#fff}

/* CHAT WINDOW */
.chat-window{position:fixed;inset:0;background:#0f0f0f;display:none;flex-direction:column;z-index:200}
.chat-window.show{display:flex}
.chat-topbar{height:60px;background:#111;display:flex;align-items:center;padding:0 12px;gap:12px;flex-shrink:0;border-bottom:1px solid #1a1a1a}
.chat-back{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:4px}
.chat-tav{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#ff6b6b,#4d96ff);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700}
.chat-tinfo{flex:1}
.chat-tname{font-size:15px;font-weight:700}
.chat-tstatus{font-size:11px;color:#6bcb77}
.chat-actions{display:flex;gap:4px}
.chat-msg-area{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:6px;background:#0a0a0a}
.chat-msg-area::-webkit-scrollbar{width:3px}
.msg-bubble{max-width:70%;padding:8px 12px;border-radius:12px;font-size:13px;line-height:1.5;position:relative;word-break:break-word}
.msg-bubble.sent{background:#005c4b;border-radius:12px 12px 2px 12px;align-self:flex-end;color:#fff}
.msg-bubble.recv{background:#1a1a1a;border-radius:12px 12px 12px 2px;align-self:flex-start;color:#fff}
.msg-time{font-size:10px;color:rgba(255,255,255,0.5);margin-top:2px;text-align:right}
.msg-date{text-align:center;font-size:11px;color:#555;margin:8px 0;background:#111;border-radius:10px;padding:3px 12px;align-self:center}

/* INPUT AREA */
.chat-input-wrap{padding:8px 12px;background:#111;border-top:1px solid #1a1a1a;display:flex;align-items:flex-end;gap:8px;flex-shrink:0}
.chat-input-box{flex:1;background:#1a1a1a;border:none;border-radius:20px;padding:10px 16px;color:#fff;font-size:14px;outline:none;resize:none;max-height:120px;overflow-y:auto;font-family:'Segoe UI',sans-serif}
.chat-input-box::placeholder{color:#555}
.input-actions{display:flex;align-items:center;gap:4px}
.inp-btn{width:38px;height:38px;background:none;border:none;color:#888;cursor:pointer;font-size:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0}
.inp-btn:hover{color:#fff;background:#2a2a2a}
.send-btn{width:42px;height:42px;background:#25d366;border:none;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity 0.2s}
.send-btn:hover{opacity:0.85}

/* INFO MODAL */
.info-modal{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:300;display:none;align-items:center;justify-content:center}
.info-modal.show{display:flex}
.info-box{background:#1a1a1a;border-radius:16px;padding:24px;width:90%;max-width:360px}
.info-header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.info-av{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#ff6b6b,#4d96ff);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700}
.info-name{font-size:18px;font-weight:700}
.info-status{font-size:13px;color:#6bcb77;margin-top:4px}
.info-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-top:1px solid #222;font-size:13px;color:#ccc}
.info-row-icon{font-size:18px;width:24px;text-align:center}
.info-close{width:100%;padding:12px;background:#111;border:none;border-radius:10px;color:#fff;cursor:pointer;font-size:14px;font-weight:600;margin-top:16px}

/* BOTTOM NAV mobile */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:56px;background:#0f0f0f;border-top:1px solid #1a1a1a;z-index:100}
.bottom-nav-inner{display:flex;height:100%}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;text-decoration:none;color:#888;font-size:9px}
.bnav-item.active,.bnav-item:hover{color:#fff}
.bnav-icon{font-size:22px}
.bnav-post{width:44px;height:44px;background:linear-gradient(135deg,#4d96ff,#6bcb77);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;margin-top:-8px}
@media(max-width:900px){.bottom-nav{display:block}}
</style>
</head>
<body>

<div class="topbar">
  <h2>Hypo</h2>
  <button class="icon-btn" onclick="alert('New message')">✏️</button>
</div>

<div class="tabs">
  <div class="tab active" id="tab-chats" onclick="switchTab('chats')">Chats</div>
  <div class="tab" id="tab-groups" onclick="switchTab('groups')">Groups</div>
  <div class="tab" id="tab-calls" onclick="switchTab('calls')">Calls</div>
</div>

<div class="chat-list" id="chat-list"></div>

<!-- CHAT WINDOW -->
<div class="chat-window" id="chat-window">
  <div class="chat-topbar">
    <button class="chat-back" onclick="closeChat()">←</button>
    <div class="chat-tav" id="ct-av">K</div>
    <div class="chat-tinfo">
      <div class="chat-tname" id="ct-name">Krishna</div>
      <div class="chat-tstatus" id="ct-status">online</div>
    </div>
    <div class="chat-actions">
      <button class="icon-btn" onclick="startCall('audio')" title="Audio Call">📞</button>
      <button class="icon-btn" onclick="startCall('video')" title="Video Call">📹</button>
      <button class="icon-btn" onclick="openInfo()" title="Info">ℹ️</button>
    </div>
  </div>
  <div class="chat-msg-area" id="msg-area"></div>
  <div class="chat-input-wrap">
    <div class="input-actions">
      <button class="inp-btn" onclick="attachFile()" title="Attach">📎</button>
      <button class="inp-btn" onclick="openCamera()" title="Camera">📷</button>
    </div>
    <textarea class="chat-input-box" id="msg-input" placeholder="Message..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="inp-btn" onclick="toggleEmoji()" title="Emoji">😊</button>
    <button class="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<!-- INFO MODAL -->
<div class="info-modal" id="info-modal">
  <div class="info-box">
    <div class="info-header">
      <div class="info-av" id="info-av">K</div>
      <div>
        <div class="info-name" id="info-name">Krishna</div>
        <div class="info-status">● Online</div>
      </div>
    </div>
    <div class="info-row"><span class="info-row-icon">👤</span>@<span id="info-username">krishna123</span></div>
    <div class="info-row"><span class="info-row-icon">📍</span>Varanasi, India</div>
    <div class="info-row"><span class="info-row-icon">👥</span>24 mutual Vibers</div>
    <div class="info-row"><span class="info-row-icon">🔔</span>Notifications: On</div>
    <div class="info-row" style="cursor:pointer" onclick="blockUser()"><span class="info-row-icon">🚫</span>Block User</div>
    <button class="info-close" onclick="document.getElementById('info-modal').classList.remove('show')">Close</button>
  </div>
</div>

<!-- BOTTOM NAV mobile -->
<div class="bottom-nav">
  <div class="bottom-nav-inner">
    <a class="bnav-item" href="flash.html"><span class="bnav-icon">🏠</span>Flash</a>
    <a class="bnav-item" href="flow.html"><span class="bnav-icon">📽️</span>Flow</a>
    <a class="bnav-item" href="post.html"><div class="bnav-post">➕</div></a>
    <a class="bnav-item active" href="hypo.html"><span class="bnav-icon">💬</span>Hypo</a>
    <a class="bnav-item" href="base.html"><span class="bnav-icon">👤</span>Base</a>
  </div>
</div>

<script>
var user = JSON.parse(localStorage.getItem('vybeoza_user')||'null');
if(!user){ location.href='index.html'; }

var chats = [
  {id:1, name:'Krishna', username:'krishna123', last:'Bhai kal milte hain!', time:'2m', unread:2, online:true},
  {id:2, name:'Suryansh', username:'suryansh_vy', last:'That video was 🔥', time:'15m', unread:0, online:true},
  {id:3, name:'Arnav', username:'arnav_v', last:'Check this out 👇', time:'1h', unread:5, online:false},
  {id:4, name:'Priya', username:'priya_vibe', last:'Thanks for the follow!', time:'3h', unread:0, online:false},
  {id:5, name:'Rahul', username:'rahul_xyz', last:'VYBEOZA is amazing!', time:'1d', unread:1, online:false},
];
var groups = [
  {id:101, name:'VYBEOZA Creators', last:'Arnav: New video dropping tonight!', time:'5m', unread:12, online:false, isGroup:true},
  {id:102, name:'Tech Vibers', last:'Suryansh: AI news just hit different', time:'30m', unread:0, online:false, isGroup:true},
  {id:103, name:'Varanasi Gang', last:'Priya: Let\'s meet this weekend', time:'2h', unread:3, online:false, isGroup:true},
];
var messages = {};
var activeChatId = null;
var activeChats = chats;

function switchTab(tab){
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  document.getElementById('tab-'+tab).classList.add('active');
  if(tab==='chats') activeChats = chats;
  else if(tab==='groups') activeChats = groups;
  else activeChats = [];
  renderList();
}

function renderList(){
  var list = document.getElementById('chat-list');
  list.innerHTML = '';
  activeChats.forEach(function(c){
    var el = document.createElement('div');
    el.className = 'chat-item';
    el.onclick = function(){ openChat(c); };
    el.innerHTML = '<div class="chat-avatar">'
      +(c.isGroup ? '👥' : c.name[0])
      +(c.online ? '<div class="online-dot"></div>' : '')
      +'</div>'
      +'<div class="chat-info">'
      +'<div class="chat-name">'+c.name+'</div>'
      +'<div class="chat-last">'+c.last+'</div>'
      +'</div>'
      +'<div class="chat-meta">'
      +'<span class="chat-time">'+c.time+'</span>'
      +(c.unread>0 ? '<span class="chat-badge">'+c.unread+'</span>' : '')
      +'</div>';
    list.appendChild(el);
  });
  if(activeChats.length === 0){
    list.innerHTML = '<div style="text-align:center;padding:40px;color:#555">No calls yet</div>';
  }
}

function openChat(c){
  activeChatId = c.id;
  document.getElementById('ct-av').textContent = c.isGroup ? '👥' : c.name[0];
  document.getElementById('ct-name').textContent = c.name;
  document.getElementById('ct-status').textContent = c.online ? 'online' : 'last seen recently';
  document.getElementById('ct-status').style.color = c.online ? '#6bcb77' : '#888';
  document.getElementById('info-av').textContent = c.name[0];
  document.getElementById('info-name').textContent = c.name;
  document.getElementById('info-username').textContent = c.username || (c.name.toLowerCase().replace(' ','_'));
  // Clear badge
  c.unread = 0;
  renderList();
  // Load/init messages
  if(!messages[c.id]){
    messages[c.id] = [
      {text:'Hey! How are you?', sent:false, time:'10:30 AM'},
      {text:'I\'m great! Saw your latest post 🔥', sent:true, time:'10:31 AM'},
      {text:'Thanks! Working on something new for VYBEOZA', sent:false, time:'10:32 AM'},
      {text:'Can\'t wait to see it!', sent:true, time:'10:33 AM'},
    ];
  }
  document.getElementById('chat-window').classList.add('show');
  renderMessages();
}

function closeChat(){
  document.getElementById('chat-window').classList.remove('show');
}

function renderMessages(){
  var area = document.getElementById('msg-area');
  area.innerHTML = '';
  var dateEl = document.createElement('div');
  dateEl.className = 'msg-date';
  dateEl.textContent = 'Today';
  area.appendChild(dateEl);
  (messages[activeChatId]||[]).forEach(function(m){
    var el = document.createElement('div');
    el.className = 'msg-bubble '+(m.sent?'sent':'recv');
    el.innerHTML = m.text + '<div class="msg-time">'+m.time+(m.sent?' ✓✓':'')+'</div>';
    area.appendChild(el);
  });
  area.scrollTop = area.scrollHeight;
}

function sendMessage(){
  var inp = document.getElementById('msg-input');
  var txt = inp.value.trim();
  if(!txt || !activeChatId) return;
  var now = new Date();
  var time = now.getHours()+':'+(now.getMinutes()<10?'0':'')+now.getMinutes();
  messages[activeChatId].push({text:txt, sent:true, time:time});
  inp.value = '';
  inp.style.height = '';
  renderMessages();
}

function handleKey(e){
  if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(); }
}
function autoResize(el){
  el.style.height = '';
  el.style.height = Math.min(el.scrollHeight, 120)+'px';
}
function attachFile(){
  var inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = 'image/*,video/*,*/*';
  inp.onchange = function(){
    if(inp.files[0]){
      var msg = '[File: '+inp.files[0].name+']';
      var now = new Date();
      var time = now.getHours()+':'+(now.getMinutes()<10?'0':'')+now.getMinutes();
      messages[activeChatId].push({text:msg, sent:true, time:time});
      renderMessages();
    }
  };
  inp.click();
}
function openCamera(){ alert('Camera (demo)'); }
function toggleEmoji(){ alert('Emoji picker (demo)'); }
function openInfo(){ document.getElementById('info-modal').classList.add('show'); }
function blockUser(){ if(confirm('Block this user?')){ closeChat(); document.getElementById('info-modal').classList.remove('show'); }}
function startCall(type){
  alert((type==='audio'?'📞 Audio':'📹 Video')+' calling... (demo)');
}

renderList();
</script>
</body>
</html>
