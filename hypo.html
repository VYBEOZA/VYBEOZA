<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>VYBEOZA - Hypo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0a;--bg2:#111;--bg3:#1a1a1a;--bg4:#242424;--accent:#ff2d78;--accent2:#00f0c8;--accent3:#a259ff;--text:#fff;--text2:#ccc;--muted:#777;--border:#272727;--font:"DM Sans",sans-serif;--brand:"Syne",sans-serif}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden}
button,input,textarea{font-family:var(--font);cursor:pointer}

/* TOPBAR */
.topbar{height:52px;background:var(--bg2);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;border-bottom:1px solid var(--border)}
.topbar h2{font-family:var(--brand);font-size:18px;font-weight:700;flex:1}
.ico-btn{background:none;border:none;color:var(--muted);width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;transition:all .2s}
.ico-btn:hover{background:var(--bg3);color:var(--text)}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg2)}
.tab-btn{flex:1;padding:11px;text-align:center;font-size:12px;font-weight:600;color:var(--muted);border:none;background:none;border-bottom:2px solid transparent;transition:all .2s;cursor:pointer}
.tab-btn.on{color:var(--text);border-bottom-color:var(--accent)}

/* PAGE STRUCTURE */
.page{display:flex;flex-direction:column;height:100vh}
.chat-list{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.chat-list::-webkit-scrollbar{width:3px}
.chat-list::-webkit-scrollbar-thumb{background:var(--border)}

/* CHAT ITEM */
.chat-item{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.chat-item:hover,.chat-item:active{background:var(--bg2)}
.chat-av{width:46px;height:46px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;position:relative}
.chat-av.group{border-radius:12px}
.online-dot{position:absolute;bottom:1px;right:1px;width:10px;height:10px;background:var(--accent2);border-radius:50%;border:2px solid var(--bg)}
.chat-info{flex:1;min-width:0}
.chat-name{font-size:13px;font-weight:600;margin-bottom:2px}
.chat-prev{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.chat-time{font-size:10px;color:var(--muted)}
.chat-badge{background:var(--accent2);color:#000;border-radius:10px;font-size:10px;padding:2px 7px;font-weight:700}

/* CHAT WINDOW (full screen overlay) */
.chat-win{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1)}
.chat-win.open{transform:translateX(0)}
.cw-top{height:58px;background:var(--bg2);display:flex;align-items:center;gap:8px;padding:0 12px;flex-shrink:0;border-bottom:1px solid var(--border)}
.cw-back{background:none;border:none;color:var(--text);font-size:22px;padding:4px 8px 4px 0}
.cw-av{width:36px;height:36px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.cw-tinfo{flex:1;cursor:pointer}
.cw-name{font-size:13px;font-weight:600}
.cw-status{font-size:10px;color:var(--accent2)}
.cw-actions{display:flex;gap:2px}
.cw-btn{background:none;border:none;color:var(--muted);width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px}
.cw-btn:hover{background:var(--bg3);color:var(--text)}

/* MESSAGES AREA */
.cw-msgs{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:4px;scrollbar-width:thin;background:#0a0a14}
.cw-msgs::-webkit-scrollbar{width:3px}
.cw-msgs::-webkit-scrollbar-thumb{background:var(--border)}
.msg-date{text-align:center;margin:8px 0}
.msg-date span{background:rgba(255,255,255,.1);color:var(--muted);font-size:10px;padding:3px 12px;border-radius:10px}
.msg-in,.msg-out{max-width:72%;word-break:break-word}
.msg-in{background:var(--bg3);padding:8px 12px;border-radius:12px 12px 12px 3px;font-size:13px;line-height:1.5;align-self:flex-start;color:var(--text2);position:relative}
.msg-out{background:linear-gradient(135deg,#005a3c,#004d33);padding:8px 12px;border-radius:12px 12px 3px 12px;font-size:13px;line-height:1.5;align-self:flex-end;color:#fff;position:relative}
.msg-time-in,.msg-time-out{font-size:9px;color:var(--muted);margin-top:3px}
.msg-time-in{text-align:left}
.msg-time-out{text-align:right;color:rgba(255,255,255,.5)}
.msg-tick{color:var(--accent2);font-size:9px}
.media-msg{border-radius:10px;background:var(--bg4);padding:10px;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2)}
.media-ico{font-size:22px}

/* INPUT AREA */
.cw-input-area{flex-shrink:0;background:var(--bg2);border-top:1px solid var(--border)}
.emoji-tray{display:none;flex-wrap:wrap;gap:4px;padding:8px 10px;border-bottom:1px solid var(--border);max-height:80px;overflow-y:auto}
.emoji-tray.open{display:flex}
.ep-btn{background:none;border:none;font-size:20px;padding:3px;border-radius:6px;cursor:pointer}
.ep-btn:hover{background:var(--bg3)}
.cw-row{display:flex;align-items:flex-end;gap:6px;padding:8px 10px}
.attach-btn,.cam-btn,.emoji-btn{background:none;border:none;color:var(--muted);font-size:20px;padding:4px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.attach-btn:hover,.cam-btn:hover,.emoji-btn:hover{color:var(--text)}
.cw-inp{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:9px 14px;color:var(--text);font-size:13px;outline:none;resize:none;max-height:100px;overflow-y:auto;line-height:1.4}
.cw-inp:focus{border-color:var(--accent3)}
.cw-inp::placeholder{color:var(--muted)}
.send-btn{width:38px;height:38px;background:var(--accent);border:none;border-radius:50%;color:#fff;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* INFO MODAL */
.info-modal{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:center;justify-content:center}
.info-modal.open{display:flex}
.info-box{background:var(--bg2);border-radius:16px;padding:24px;width:90%;max-width:360px;border:1px solid var(--border)}
.info-av-big{width:72px;height:72px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:28px;border:2px solid var(--accent);margin:0 auto 10px}
.info-name{font-size:18px;font-weight:700;text-align:center}
.info-status{font-size:12px;color:var(--accent2);text-align:center;margin-top:4px;margin-bottom:16px}
.info-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-top:1px solid var(--border);font-size:13px;color:var(--text2)}
.info-row-ico{font-size:18px;width:24px;text-align:center;flex-shrink:0}
.info-close{width:100%;padding:11px;background:var(--bg3);border:none;border-radius:10px;color:var(--text);font-size:14px;font-weight:600;margin-top:16px;cursor:pointer}
.info-close:hover{background:var(--bg4)}

/* CALL SCREEN */
.call-screen{position:fixed;inset:0;background:#000;z-index:300;display:none;flex-direction:column;align-items:center;justify-content:space-between;padding:60px 20px 40px}
.call-screen.open{display:flex}
.call-av{width:90px;height:90px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:40px;border:3px solid var(--accent);margin-bottom:12px}
.call-name-txt{font-size:22px;font-weight:600;color:#fff;margin-bottom:8px}
.call-status-txt{font-size:14px;color:rgba(255,255,255,.6)}
.call-btns{display:flex;gap:24px;align-items:center}
.call-end-btn{width:60px;height:60px;background:#ff4444;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;border:none;color:#fff}
.call-tog-btn{width:48px;height:48px;background:rgba(255,255,255,.15);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;border:none;color:#fff}
.call-tog-btn.on{background:var(--accent)}

/* BOTTOM NAV */
.bnav{display:none;position:fixed;bottom:0;left:0;right:0;height:56px;background:var(--bg);border-top:1px solid var(--border);z-index:50;justify-content:space-around;align-items:center}
.bn-btn{background:none;border:none;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 8px;text-decoration:none}
.bn-btn.on{color:var(--accent)}
.bn-ico{font-size:19px;line-height:1}
.bn-lbl{font-size:7px;letter-spacing:.5px;text-transform:uppercase;font-weight:500}
.bn-fab{width:42px;height:42px;background:linear-gradient(135deg,var(--accent),var(--accent3));border:none;border-radius:50%;color:#fff;font-size:20px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px #ff2d7840}

.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:#1e1e1e;border:1px solid var(--border);padding:7px 18px;border-radius:18px;font-size:12px;opacity:0;transition:.3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1}

@media(max-width:768px){.bnav{display:flex}}
</style>
</head>
<body>

<div class="page">
  <!-- TOPBAR -->

    <h2>Hypo</h2>

</div>

<!-- INFO MODAL -->
<div class="info-modal" id="info-modal">
  <div class="info-box">
    <div class="info-av-big" id="info-av-big">K</div>

</div>

<!-- CALL SCREEN -->
<div class="call-screen" id="call-screen">
  <div style="text-align:center">
    <div class="call-av" id="call-av-ico">🎸</div>
    <div class="call-name-txt" id="call-name-txt">Krishna</div>

  </div>
  <div class="call-btns">

</div>

<!-- BOTTOM NAV -->
<div class="bnav">

  <a class="bn-btn" href="flow.html"><span class="bn-ico">📽️</span><span class="bn-lbl">Flow</span></a>

</div>

<script>
var user = null;
try { user = JSON.parse(localStorage.getItem('vyb_user')); } catch(e){}
if(!user){ window.location.href = 'index.html'; }

function toast(msg){
  var el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show');
  clearTimeout(window._tt); window._tt=setTimeout(function(){el.classList.remove('show');},1800);
}

var USERS = [
  {name:'Krishna',handle:'krishna_vibe',emoji:'🎸',online:true},
  {name:'Suryansh',handle:'suryansh_gg',emoji:'🎮',online:true},
  {name:'Arnav',handle:'arnav_creates',emoji:'🏄',online:false},
  {name:'Riya',handle:'riya.art',emoji:'🎨',online:false},
  {name:'Dev',handle:'dev_rockets',emoji:'🚀',online:false},
  {name:'Meera',handle:'meera.flow',emoji:'🌸',online:false}
];
var CHATS = [
  {type:'chat',idx:0,last:'Bhai kal milte hain! 👋',time:'now',badge:2},
  {type:'chat',idx:1,last:'That Flow was 🔥',time:'2m',badge:0},
  {type:'chat',idx:2,last:"Let's collab!",time:'15m',badge:5},
  {type:'chat',idx:3,last:'Just dropped a VISO!',time:'1h',badge:0},
  {type:'chat',idx:4,last:'Thanks! 🙏',time:'3h',badge:1},
  {type:'chat',idx:5,last:'The edit came out insane',time:'6h',badge:0}
];
var GROUPS = [
  {name:'VYBEOZA Creators',emoji:'🎬',members:'128 members',last:'Share your latest!',time:'now',badge:12},
  {name:'Varanasi Vibers',emoji:'🏛️',members:'64 members',last:'Anyone going to the ghats?',time:'5m',badge:0},
  {name:'Music Makers',emoji:'🎵',members:'42 members',last:'New collab track is ready!',time:'1h',badge:3},
  {name:'Tech & Startup',emoji:'🚀',members:'89 members',last:'Big announcement tomorrow!',time:'3h',badge:0}
];
var MSG_DATA = [
  [{f:'in',t:'Bhai what\'s up!'},{f:'out',t:'All good, just posted a VISO'},{f:'in',t:'Saw it! 🔥 Fire bro'}],
  [{f:'in',t:'Did you see my latest Flow?'},{f:'out',t:'Yes!! Editing was insane'},{f:'in',t:'Worked on it for 3 days'}],
  [{f:'out',t:'Hey let\'s collab?'},{f:'in',t:'Say less, I\'m in!'}],
  [{f:'in',t:'Your Base is looking 🔥'},{f:'out',t:'Just updated it today!'}],
  [{f:'out',t:'New VISO dropping tonight'},{f:'in',t:'I\'ll be watching!'}],
  [{f:'in',t:'You went viral bro 🚀'},{f:'out',t:'Wasn\'t expecting that!'}]
];

var activeChatData = null;
var messages = {};

function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('on');});
  document.getElementById('tab-'+tab).classList.add('on');
  var list = document.getElementById('chat-list');
  list.innerHTML = '';
  if(tab==='chats') renderChats();
  else if(tab==='groups') renderGroups();
  else renderCalls();
}

function renderChats(){
  var list = document.getElementById('chat-list');
  CHATS.forEach(function(c){
    var u = USERS[c.idx];
    var item = document.createElement('div'); item.className='chat-item';
    item.innerHTML='<div class="chat-av">'+(u.online?'<div class="online-dot"></div>':'')+u.emoji+'</div>'
      +'<div class="chat-info"><div class="chat-name">'+u.name+'</div><div class="chat-prev">'+c.last+'</div></div>'
      +'<div class="chat-right"><div class="chat-time">'+c.time+'</div>'+(c.badge>0?'<div class="chat-badge">'+c.badge+'</div>':'')+' </div>';
    item.onclick=function(){ c.badge=0; renderChats(); openChat(c.idx, false); };
    list.appendChild(item);
  });
}

function renderGroups(){
  var list = document.getElementById('chat-list');
  GROUPS.forEach(function(g,i){
    var item = document.createElement('div'); item.className='chat-item';
    item.innerHTML='<div class="chat-av group">'+g.emoji+'</div>'
      +'<div class="chat-info"><div class="chat-name">'+g.name+'</div><div class="chat-prev">'+g.last+'</div>'
      +'<div class="chat-prev" style="font-size:10px">'+g.members+'</div></div>'
      +'<div class="chat-right"><div class="chat-time">'+g.time+'</div>'+(g.badge>0?'<div class="chat-badge">'+g.badge+'</div>':'')+' </div>';
    item.onclick=function(){ g.badge=0; renderGroups(); openGroupChat(i); };
    list.appendChild(item);
  });
}

function renderCalls(){
  var list = document.getElementById('chat-list');
  var callData = [
    {u:USERS[0],dir:'↗',type:'📞',time:'Today, 2:30 PM',missed:false},
    {u:USERS[1],dir:'↙',type:'📹',time:'Yesterday, 6:15 PM',missed:false},
    {u:USERS[2],dir:'↗',type:'📞',time:'Yesterday, 11 AM',missed:false},
    {u:USERS[3],dir:'✕',type:'📹',time:'2 days ago',missed:true}
  ];
  callData.forEach(function(cd){
    var item = document.createElement('div'); item.className='chat-item';
    var cb = document.createElement('button');
    cb.style.cssText='background:var(--bg3);border:none;color:var(--text2);width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0';
    cb.textContent='📞';
    cb.onclick=function(e){e.stopPropagation();startCall(cd.u,'audio');};
    item.innerHTML='<div class="chat-av">'+cd.u.emoji+'</div>'
      +'<div class="chat-info"><div class="chat-name">'+cd.u.name+'</div>'
      +'<div class="chat-prev" style="color:'+(cd.missed?'#ff4444':'var(--muted)')+'">'+cd.dir+' · '+cd.type+'</div>'
      +'<div class="chat-prev" style="font-size:10px">'+cd.time+'</div></div>';
    item.appendChild(cb);
    item.onclick=function(){ startCall(cd.u,'audio'); };
    list.appendChild(item);
  });
}

function openChat(idx, isGroup){
  var u = USERS[idx];
  activeChatData = {idx:idx, isGroup:isGroup, u:u};
  document.getElementById('cw-av').textContent = u.emoji;
  document.getElementById('cw-name').textContent = u.name;
  var online = u.online;
  document.getElementById('cw-status').textContent = online?'online':'last seen recently';
  document.getElementById('cw-status').style.color = online?'var(--accent2)':'var(--muted)';
  // Info modal data
  document.getElementById('info-av-big').textContent = u.emoji;
  document.getElementById('info-nm').textContent = u.name;
  document.getElementById('info-st').textContent = online?'● Online':'● Last seen recently';
  document.getElementById('info-handle').textContent = u.handle;
  // Load messages
  if(!messages[idx]){
    messages[idx] = MSG_DATA[idx] ? MSG_DATA[idx].slice() : [{f:'in',t:'Hey! How are you?'}];
  }
  renderMsgs(idx);
  document.getElementById('chat-win').classList.add('open');
}

function openGroupChat(idx){
  var g = GROUPS[idx];
  document.getElementById('cw-av').textContent = g.emoji;
  document.getElementById('cw-name').textContent = g.name;
  document.getElementById('cw-status').textContent = g.members;
  document.getElementById('cw-status').style.color = 'var(--muted)';
  document.getElementById('info-av-big').textContent = g.emoji;
  document.getElementById('info-nm').textContent = g.name;
  document.getElementById('info-st').textContent = g.members;
  document.getElementById('info-handle').textContent = g.name.toLowerCase().replace(' ','_');
  var gKey = 'group_'+idx;
  if(!messages[gKey]){
    messages[gKey]=[{f:'in',t:'Krishna: Welcome everyone! 🎉'},{f:'in',t:'Riya: Excited to be here!'},{f:'out',t:"Let's create something amazing!"},{f:'in',t:'Dev: Collab ideas?'}];
  }
  activeChatData = {idx:gKey, isGroup:true, u:{name:g.name,emoji:g.emoji}};
  renderMsgs(gKey);
  document.getElementById('chat-win').classList.add('open');
}

function renderMsgs(key){
  var area = document.getElementById('cw-msgs');
  area.innerHTML = '';
  var dateDiv = document.createElement('div'); dateDiv.className='msg-date';
  dateDiv.innerHTML='<span>Today</span>';
  area.appendChild(dateDiv);
  (messages[key]||[]).forEach(function(m){
    var wrap = document.createElement('div');
    if(m.f==='in'){
      wrap.className='msg-in';
      wrap.innerHTML=m.t+'<div class="msg-time-in">'+getTime()+'</div>';
    } else {
      wrap.className='msg-out';
      wrap.innerHTML=m.t+'<div class="msg-time-out">'+getTime()+' <span class="msg-tick">✓✓</span></div>';
    }
    area.appendChild(wrap);
  });
  area.scrollTop = area.scrollHeight;
}

function getTime(){
  var now = new Date();
  return now.getHours()+':'+(now.getMinutes()<10?'0':'')+now.getMinutes();
}

function sendMsg(){
  var inp = document.getElementById('cw-inp');
  var val = inp.value.trim();
  if(!val || !activeChatData) return;
  var key = activeChatData.idx;
  if(!messages[key]) messages[key] = [];
  messages[key].push({f:'out',t:val});
  inp.value = ''; inp.style.height='';
  renderMsgs(key);
  // Auto reply
  setTimeout(function(){
    messages[key].push({f:'in',t:['Nice! 🔥','Love it!','That\'s amazing bro!','🎉🎉🎉','Keep going!'][Math.floor(Math.random()*5)]});
    renderMsgs(key);
  },1200);
}

// INPUT
document.getElementById('cw-inp').addEventListener('keydown',function(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}
});
document.getElementById('cw-inp').addEventListener('input',function(){
  this.style.height='';
  this.style.height=Math.min(this.scrollHeight,100)+'px';
});
document.getElementById('send-btn').onclick=sendMsg;
document.getElementById('emoji-btn').onclick=function(){
  document.getElementById('emoji-tray').classList.toggle('open');
};
document.querySelectorAll('.ep-btn').forEach(function(btn){
  btn.onclick=function(){
    var inp=document.getElementById('cw-inp');
    inp.value+=this.getAttribute('data-e');
    inp.focus();
  };
});
document.getElementById('attach-btn').onclick=function(){
  var inp=document.createElement('input'); inp.type='file'; inp.accept='image/*,video/*,*/*';
  inp.onchange=function(){
    if(inp.files[0]){
      var key=activeChatData.idx;
      messages[key].push({f:'out',t:'📎 '+inp.files[0].name});
      renderMsgs(key);
    }
  };
  inp.click();
};
document.getElementById('cam-btn').onclick=function(){ toast('Camera (demo)'); };
document.getElementById('cw-back').onclick=function(){
  document.getElementById('chat-win').classList.remove('open');
  document.getElementById('emoji-tray').classList.remove('open');
};
document.getElementById('btn-info').onclick=function(){ document.getElementById('info-modal').classList.add('open'); };
document.getElementById('btn-audio-call').onclick=function(){ if(activeChatData) startCall(activeChatData.u,'audio'); };
document.getElementById('btn-video-call').onclick=function(){ if(activeChatData) startCall(activeChatData.u,'video'); };

// CALL
function startCall(u,type){
  document.getElementById('call-av-ico').textContent=u.emoji||'🎸';
  document.getElementById('call-name-txt').textContent=u.name||'Unknown';
  document.getElementById('call-status-txt').textContent=type==='video'?'Video calling...':'Calling...';
  document.getElementById('call-screen').classList.add('open');
  setTimeout(function(){document.getElementById('call-status-txt').textContent='Connected · 0:01';},2000);
}
function endCall(){ document.getElementById('call-screen').classList.remove('open'); toast('Call ended'); }
document.getElementById('btn-mute').onclick=function(){this.classList.toggle('on');toast(this.classList.contains('on')?'Muted 🔇':'Unmuted 🎤');};
document.getElementById('btn-speaker').onclick=function(){this.classList.toggle('on');toast(this.classList.contains('on')?'Speaker on 🔊':'Earpiece');};

function blockUser(){ if(confirm('Block user?')){ document.getElementById('info-modal').classList.remove('open'); document.getElementById('chat-win').classList.remove('open'); toast('User blocked'); }}

// INIT
renderChats();
</script>
</body>
</html>
