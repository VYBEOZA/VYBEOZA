<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VYBEOZA — Pop</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0a;--bg2:#111;--bg3:#1a1a1a;--accent:#ff2d78;--accent2:#00f0c8;--accent3:#a259ff;--text:#fff;--text2:#ccc;--muted:#777;--border:#272727;--font:"DM Sans",sans-serif;--brand:"Syne",sans-serif;}
html,body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100%}
.topbar{position:sticky;top:0;height:56px;display:flex;align-items:center;gap:10px;padding:0 16px;border-bottom:1px solid var(--border);background:var(--bg);z-index:50}
.back-btn{background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;padding:4px 10px 4px 0}
.page-title{font-family:var(--brand);font-size:20px;font-weight:700;flex:1}
.mark-all{font-size:12px;color:var(--accent);cursor:pointer;border:none;background:none}
.sec{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;padding:12px 16px 6px;font-weight:600}
.nitem{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.nitem:hover{background:var(--bg2)}
.nitem.unread{background:#ff2d780a;border-left:3px solid var(--accent)}
.nico{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.n-like{background:#ff2d7820;color:var(--accent)}
.n-comment{background:#a259ff20;color:var(--accent3)}
.n-follow{background:#00f0c820;color:var(--accent2)}
.n-live{background:#ff8c0020;color:#ff8c00}
.n-money{background:#ffd70020;color:#ffd700}
.ntxt{font-size:13px;line-height:1.5;color:var(--text2);flex:1}
.ntxt b{color:var(--text);font-weight:500}
.ntime{font-size:11px;color:var(--muted);margin-top:2px}
.nthumb{width:42px;height:42px;border-radius:8px;background:var(--bg3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--muted)}
.bnav{display:none;position:fixed;bottom:0;left:0;right:0;justify-content:space-around;align-items:center;height:60px;border-top:1px solid var(--border);background:var(--bg)}
.bn-btn{background:none;border:none;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 10px;cursor:pointer;transition:color .2s}
.bn-btn.active{color:var(--accent)}
.bn-ico{font-size:20px;line-height:1}.bn-lbl{font-size:8px;letter-spacing:.5px;text-transform:uppercase;font-weight:500}
.bn-fab{width:44px;height:44px;background:linear-gradient(135deg,var(--accent),var(--accent3));border:none;border-radius:50%;color:#fff;font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer}
@media(max-width:768px){.bnav{display:flex}body{padding-bottom:60px}}
</style>
</head>
<body>
<div class="topbar">
  <button class="back-btn" onclick="window.location.href='Flash.html'">←</button>
  <div class="page-title">Pop</div>
  <button class="mark-all" onclick="alert('All marked as read!')">Mark all read</button>
</div>
<div class="sec">Today</div>
<div id="notif-list"></div>
<div class="bnav">
  <button class="bn-btn" onclick="window.location.href='Flash.html'"><span class="bn-ico">🏡</span><span class="bn-lbl">Flash</span></button>
  <button class="bn-btn" onclick="window.location.href='flow.html'"><span class="bn-ico">📽️</span><span class="bn-lbl">Flow</span></button>
  <button class="bn-fab" onclick="window.location.href='post.html'">＋</button>
  <button class="bn-btn" onclick="window.location.href='messages.html'"><span class="bn-ico">💬</span><span class="bn-lbl">Hypo</span></button>
  <button class="bn-btn" onclick="window.location.href='profile.html'"><span class="bn-ico">👤</span><span class="bn-lbl">Base</span></button>
</div>
<script>
if(localStorage.getItem("vybeoza_logged_in") !== "true") window.location.href = "index.html";
var NOTIFS = [
  {cls:"n-like",ico:"❤️",user:"Krishna",action:"liked your VISO",time:"2m ago",unread:true},
  {cls:"n-comment",ico:"💬",user:"Riya",action:'commented: "This is fire!"',time:"8m ago",unread:true},
  {cls:"n-follow",ico:"👤",user:"Dev",action:"started Vibing with you",time:"23m ago",unread:true},
  {cls:"n-live",ico:"🔴",user:"Meera",action:"went live — join now!",time:"32m ago",unread:false},
  {cls:"n-money",ico:"💰",user:"VYBEOZA",action:"Monetization update: 4,200/5,000 hrs watch time reached!",time:"1h ago",unread:false},
  {cls:"n-like",ico:"❤️",user:"Suryansh",action:"liked your Flow",time:"2h ago",unread:false},
  {cls:"n-comment",ico:"💬",user:"Arnav",action:"replied to your comment",time:"3h ago",unread:false},
  {cls:"n-follow",ico:"👤",user:"Meera",action:"started Vibing with you",time:"5h ago",unread:false},
  {cls:"n-like",ico:"❤️",user:"Krishna",action:"saved your VISO",time:"6h ago",unread:false},
];
var list = document.getElementById("notif-list");
NOTIFS.forEach(function(n, i){
  list.innerHTML += '<div class="nitem' + (n.unread ? ' unread' : '') + '" onclick="this.classList.remove(\'unread\')">' +
    '<div class="nico ' + n.cls + '">' + n.ico + '</div>' +
    '<div style="flex:1"><div class="ntxt"><b>' + n.user + '</b> ' + n.action + '</div><div class="ntime">' + n.time + '</div></div>' +
    '<div class="nthumb">VISO ' + (i+1) + '</div>' +
  '</div>';
});
</script>
</body>
</html>
