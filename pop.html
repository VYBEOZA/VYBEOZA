<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VYBEOZA - Pop</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f0f0f;color:#fff;font-family:'Segoe UI',sans-serif;min-height:100vh}
.topbar{position:fixed;top:0;left:0;right:0;height:56px;background:#0f0f0f;display:flex;align-items:center;padding:0 16px;gap:12px;z-index:100;border-bottom:1px solid #1a1a1a}
.back-btn{background:none;border:none;color:#fff;font-size:22px;cursor:pointer}
.topbar h2{font-size:18px;font-weight:700;flex:1}

.content{margin-top:56px;padding:16px;max-width:600px;margin-left:auto;margin-right:auto;padding-bottom:80px}

.section-title{font-size:13px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:1px;margin:16px 0 8px}

.notif-item{display:flex;align-items:flex-start;gap:12px;padding:12px;border-radius:12px;cursor:pointer;transition:background 0.2s;margin-bottom:4px;border-left:3px solid transparent}
.notif-item:hover{background:#111}
.notif-item.unread{background:#111;border-left-color:#4d96ff}
.notif-av{width:44px;height:44px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700}
.notif-body{flex:1}
.notif-text{font-size:13px;line-height:1.5;color:#ccc}
.notif-text strong{color:#fff}
.notif-time{font-size:11px;color:#666;margin-top:3px}
.notif-thumb{width:44px;height:44px;border-radius:8px;background:#1a1a1a;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:22px}

.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:56px;background:#0f0f0f;border-top:1px solid #1a1a1a;z-index:100}
.bottom-nav-inner{display:flex;height:100%}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;text-decoration:none;color:#888;font-size:9px}
.bnav-item.active,.bnav-item:hover{color:#fff}
.bnav-icon{font-size:22px}
.bnav-post{width:44px;height:44px;background:linear-gradient(135deg,#4d96ff,#6bcb77);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;margin-top:-8px}
@media(max-width:900px){.bottom-nav{display:block}}
</style>
</head>
<body>
<div class="topbar">
  <button class="back-btn" onclick="history.back()">←</button>
  <h2>Pop</h2>
  <button style="background:none;border:none;color:#4d96ff;cursor:pointer;font-size:13px" onclick="markAllRead()">Mark all read</button>
</div>

<div class="content">
  <div class="section-title">Today</div>
  <div id="notif-today"></div>
  <div class="section-title">This Week</div>
  <div id="notif-week"></div>
</div>

<div class="bottom-nav">
  <div class="bottom-nav-inner">
    <a class="bnav-item" href="flash.html"><span class="bnav-icon">🏠</span>Flash</a>
    <a class="bnav-item" href="flow.html"><span class="bnav-icon">📽️</span>Flow</a>
    <a class="bnav-item" href="post.html"><div class="bnav-post">➕</div></a>
    <a class="bnav-item" href="hypo.html"><span class="bnav-icon">💬</span>Hypo</a>
    <a class="bnav-item" href="base.html"><span class="bnav-icon">👤</span>Base</a>
  </div>
</div>

<script>
var user = JSON.parse(localStorage.getItem('vybeoza_user')||'null');
if(!user){ location.href='index.html'; }

var todayNotifs = [
  {av:'👤', avBg:'#ff6b6b,#ffd93d', name:'Krishna', text:'liked your video <strong>My VYBEOZA Journey</strong>', time:'2 minutes ago', thumb:'❤️', unread:true},
  {av:'👤', avBg:'#4d96ff,#6bcb77', name:'Suryansh', text:'commented: <strong>"This is fire! 🔥"</strong> on your video', time:'15 minutes ago', thumb:'💬', unread:true},
  {av:'👤', avBg:'#ff6b6b,#4d96ff', name:'Arnav', text:'started <strong>Vibing</strong> with you', time:'1 hour ago', thumb:'⭐', unread:true},
  {av:'👤', avBg:'#6bcb77,#ffd93d', name:'Priya', text:'logged in from <strong>Varanasi, India 📍</strong> — new login detected', time:'2 hours ago', thumb:'🔐', unread:false},
  {av:'🎬', avBg:'#4d96ff,#4d96ff', name:'TechVyber', text:'uploaded a new video: <strong>AI Future 2025</strong>', time:'3 hours ago', thumb:'📹', unread:false},
];

var weekNotifs = [
  {av:'👤', avBg:'#ff6b6b,#ff6b6b', name:'Rahul', text:'started <strong>Vibing</strong> with you', time:'2 days ago', thumb:'⭐', unread:false},
  {av:'👤', avBg:'#4d96ff,#6bcb77', name:'Nisha', text:'shared your video <strong>VYBEOZA App Demo</strong>', time:'3 days ago', thumb:'📤', unread:false},
  {av:'🎮', avBg:'#6bcb77,#4d96ff', name:'GameVybe', text:'uploaded a new video you might like', time:'5 days ago', thumb:'📹', unread:false},
  {av:'💰', avBg:'#ffd93d,#ff6b6b', name:'VYBEOZA', text:'Your video reached <strong>1,000 views!</strong> Keep it up 🎉', time:'6 days ago', thumb:'🏆', unread:false},
];

function renderNotifs(items, containerId){
  var el = document.getElementById(containerId);
  el.innerHTML = '';
  items.forEach(function(n, i){
    var d = document.createElement('div');
    d.className = 'notif-item'+(n.unread?' unread':'');
    d.innerHTML = '<div class="notif-av" style="background:linear-gradient(135deg,'+n.avBg+')">'+n.av+'</div>'
      +'<div class="notif-body"><div class="notif-text"><strong>'+n.name+'</strong> '+n.text+'</div><div class="notif-time">'+n.time+'</div></div>'
      +'<div class="notif-thumb">'+n.thumb+'</div>';
    d.onclick = function(){ n.unread=false; d.classList.remove('unread'); };
    el.appendChild(d);
  });
}

function markAllRead(){
  todayNotifs.forEach(function(n){ n.unread=false; });
  weekNotifs.forEach(function(n){ n.unread=false; });
  document.querySelectorAll('.notif-item').forEach(function(el){ el.classList.remove('unread'); });
}

renderNotifs(todayNotifs, 'notif-today');
renderNotifs(weekNotifs, 'notif-week');
</script>
</body>
</html>
