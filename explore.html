<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>VYBEOZA - Explore</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0a;--bg2:#111;--bg3:#1a1a1a;--bg4:#242424;--accent:#ff2d78;--accent2:#00f0c8;--accent3:#a259ff;--text:#fff;--text2:#ccc;--muted:#777;--border:#272727;--font:"DM Sans",sans-serif;--brand:"Syne",sans-serif}
html,body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh}
button,input{font-family:var(--font);cursor:pointer}
.topbar{position:sticky;top:0;height:52px;background:var(--bg);display:flex;align-items:center;padding:0 14px;gap:10px;z-index:50;border-bottom:1px solid var(--border)}
.back-btn{background:none;border:none;color:var(--text);font-size:20px;padding:4px 8px 4px 0}
.search-wrap{flex:1;position:relative}
.search-inp{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:8px 40px 8px 16px;color:var(--text);font-size:13px;outline:none;transition:border .2s}
.search-inp:focus{border-color:var(--accent3)}
.search-inp::placeholder{color:var(--muted)}
.search-clear{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);font-size:16px;display:none}
.search-clear.show{display:block}

/* FILTERS */
.filters{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;padding:10px 14px;border-bottom:1px solid var(--border)}
.filters::-webkit-scrollbar{display:none}
.filter-btn{flex-shrink:0;padding:5px 14px;border-radius:20px;font-size:12px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);transition:all .2s;white-space:nowrap}
.filter-btn.on{background:var(--text);color:var(--bg);border-color:var(--text)}

/* CONTENT */
.content{max-width:900px;margin:0 auto;padding:14px;padding-bottom:80px}

/* TRENDING TAGS */
.trending-section{margin-bottom:20px}
.section-title{font-size:14px;font-weight:600;margin-bottom:10px;color:var(--text)}
.tag-grid{display:flex;gap:8px;flex-wrap:wrap}
.tag-pill{padding:6px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;font-size:12px;cursor:pointer;transition:all .2s;text-decoration:none;color:var(--text2)}
.tag-pill:hover{border-color:var(--accent3);color:var(--text)}

/* CHANNEL RESULT */
.channel-result{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:16px}
.ch-header{display:flex;align-items:center;gap:12px;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.ch-big-av{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent3));display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;font-weight:700;color:#fff}
.ch-meta{flex:1}
.ch-name{font-size:15px;font-weight:700}
.ch-handle{font-size:12px;color:var(--muted)}
.ch-stats{font-size:11px;color:var(--muted);margin-top:2px}
.vibe-btn{background:var(--accent);border:none;color:#fff;padding:8px 18px;border-radius:20px;font-size:12px;font-weight:600;transition:all .2s}
.vibe-btn.on{background:var(--bg3);color:var(--muted);border:1px solid var(--border)}
.ch-videos{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.ch-vid-card{cursor:pointer;border-radius:8px;overflow:hidden;background:var(--bg3)}
.ch-vid-thumb{aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;font-size:24px;position:relative}
.ch-vid-dur{position:absolute;bottom:4px;right:4px;background:rgba(0,0,0,.85);font-size:9px;padding:1px 5px;border-radius:3px;color:#fff}
.ch-vid-title{font-size:10px;padding:5px 7px;color:var(--text2);line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
@media(max-width:480px){.ch-videos{grid-template-columns:repeat(2,1fr)}}

/* VIDEO RESULTS */
.vid-result{display:flex;gap:10px;margin-bottom:14px;cursor:pointer;padding:6px;border-radius:8px;transition:background .15s}
.vid-result:hover{background:var(--bg2)}
.vr-thumb{width:140px;aspect-ratio:16/9;background:var(--bg3);border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:28px;position:relative;overflow:hidden}
.vr-bg{position:absolute;inset:0;opacity:.5}
.vr-dur{position:absolute;bottom:4px;right:4px;background:rgba(0,0,0,.85);font-size:9px;padding:1px 5px;border-radius:3px;color:#fff}
.vr-info{flex:1;min-width:0}
.vr-title{font-size:13px;font-weight:500;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:4px}
.vr-meta{font-size:11px;color:var(--muted)}

/* PEOPLE */
.people-card{display:flex;align-items:center;gap:12px;padding:10px 12px;background:var(--bg2);border-radius:10px;margin-bottom:8px}
.p-av{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent3));display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.p-info{flex:1}
.p-name{font-size:13px;font-weight:600}
.p-handle{font-size:11px;color:var(--muted)}
.p-vibe{background:var(--accent);border:none;color:#fff;padding:6px 14px;border-radius:16px;font-size:11px;font-weight:600;transition:all .2s}
.p-vibe.on{background:var(--bg3);color:var(--muted);border:1px solid var(--border)}

/* EMPTY */
.empty{text-align:center;padding:40px;color:var(--muted);font-size:14px}

.bnav{display:none;position:fixed;bottom:0;left:0;right:0;height:56px;background:var(--bg);border-top:1px solid var(--border);z-index:100;justify-content:space-around;align-items:center}
.bn-btn{background:none;border:none;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 8px;text-decoration:none}
.bn-ico{font-size:19px;line-height:1}
.bn-lbl{font-size:7px;letter-spacing:.5px;text-transform:uppercase;font-weight:500}
.bn-fab{width:42px;height:42px;background:linear-gradient(135deg,var(--accent),var(--accent3));border:none;border-radius:50%;color:#fff;font-size:20px;display:flex;align-items:center;justify-content:center}
.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:#1e1e1e;border:1px solid var(--border);padding:7px 18px;border-radius:18px;font-size:12px;opacity:0;transition:.3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1}
@media(max-width:768px){.bnav{display:flex}}
</style>
</head>
<body>
<div class="topbar">
  <button class="back-btn" onclick="history.back()">←</button>
  <div class="search-wrap">
    <input class="search-inp" id="search-inp" placeholder="Search VYBEOZA..." type="text" oninput="onSearch(this.value)" autofocus>
    <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
  </div>
</div>

<div class="filters" id="filters">
  <button class="filter-btn on" onclick="setFilter(this,'all')">All</button>
  <button class="filter-btn" onclick="setFilter(this,'videos')">Videos</button>
  <button class="filter-btn" onclick="setFilter(this,'people')">People</button>
  <button class="filter-btn" onclick="setFilter(this,'trending')">Trending</button>
</div>

<div class="content" id="content"></div>

<div class="bnav">
  <a class="bn-btn" href="flash.html"><span class="bn-ico">🏡</span><span class="bn-lbl">Flash</span></a>
  <a class="bn-btn" href="flow.html"><span class="bn-ico">📽️</span><span class="bn-lbl">Flow</span></a>
  <a class="bn-btn" href="post.html"><div class="bn-fab">＋</div></a>
  <a class="bn-btn" href="hypo.html"><span class="bn-ico">💬</span><span class="bn-lbl">Hypo</span></a>
  <a class="bn-btn" href="creator.html"><span class="bn-ico">🎬</span><span class="bn-lbl">Center</span></a>
</div>
<div class="toast" id="toast"></div>

<script>
var user=null; try{user=JSON.parse(localStorage.getItem('vyb_user'));}catch(e){} if(!user)window.location.href='index.html'; var uc=localStorage.getItem('vyb_color'); if(uc){document.documentElement.style.setProperty('--accent',uc);document.documentElement.style.setProperty('--user-color',uc);}
function toast(msg){var el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(window._tt);window._tt=setTimeout(function(){el.classList.remove('show');},1800);}

var USERS=[
  {name:'TechVyber',handle:'@techvyber',emoji:'💻',vibers:'124K',desc:'Tech reviews, tutorials & more!',videos:[{t:'AI Future 2025',e:'🤖',dur:'18:42',views:'124K'},{t:'Best Coding Setup',e:'💻',dur:'12:05',views:'89K'},{t:'New iPhone Review',e:'📱',dur:'22:10',views:'200K'}]},
  {name:'GameVybe',handle:'@gamevybe',emoji:'🎮',vibers:'89K',desc:'Gaming highlights & walkthroughs',videos:[{t:'Minecraft Build',e:'🎮',dur:'35:12',views:'45K'},{t:'Epic Gaming Moments',e:'🏆',dur:'8:30',views:'120K'},{t:'Game Review 2025',e:'🎯',dur:'15:00',views:'67K'}]},
  {name:'Krishna',handle:'@krishna_vibe',emoji:'🎸',vibers:'12.1K',desc:'Music & vibes from Varanasi 🏛️',videos:[{t:'New Track Dropping',e:'🎵',dur:'3:45',views:'8K'},{t:'Studio Session BTS',e:'🎙️',dur:'12:00',views:'5K'},{t:'Live Performance',e:'🎸',dur:'45:00',views:'15K'}]},
  {name:'Suryansh',handle:'@suryansh_gg',emoji:'🎮',vibers:'5.6K',desc:'Gaming & tech content',videos:[{t:'Best Gaming Clips',e:'🎮',dur:'10:20',views:'12K'},{t:'Review: Latest Game',e:'⭐',dur:'25:00',views:'8K'},{t:'Stream Highlights',e:'🔴',dur:'5:30',views:'20K'}]},
  {name:'Riya',handle:'@riya.art',emoji:'🎨',vibers:'18K',desc:'Digital art & design tutorials',videos:[{t:'Speed Painting',e:'🖌️',dur:'8:45',views:'35K'},{t:'Art Tutorial for Beginners',e:'✏️',dur:'20:00',views:'50K'},{t:'Portfolio Review',e:'🎨',dur:'15:30',views:'28K'}]},
  {name:'Meera',handle:'@meera.flow',emoji:'🌸',vibers:'31K',desc:'Lifestyle & aesthetic content',videos:[{t:'Morning Routine',e:'☀️',dur:'12:00',views:'80K'},{t:'Room Makeover',e:'🏠',dur:'18:30',views:'60K'},{t:'Aesthetic Vlog',e:'✨',dur:'22:00',views:'45K'}]}
];
var TITLES=['That feeling when the vibe hits just right ✨','Best moments with the crew 🔥','New day new VISO 🎯','Real talk: life is a vibe 💫','Creating something special 🎪','Varanasi never misses 🌟','No filter needed 💪','Late night studio session 🎵','Morning walk vibes ☀️','Behind the scenes 🎭','Epic gameplay moments 🎮','Travel diary 2025 ✈️'];
var GRADS=['linear-gradient(135deg,#ff2d78,#a259ff)','linear-gradient(135deg,#00f0c8,#a259ff)','linear-gradient(135deg,#ff2d78,#00f0c8)','linear-gradient(45deg,#a259ff,#ff2d78)','linear-gradient(90deg,#00f0c8,#ff2d78)'];
var TRENDING_TAGS=['#vybeoza','#viral','#trending','#varanasi','#music','#gaming','#art','#travel','#food','#comedy','#tech','#vibe'];
var curFilter='all';
var curQuery='';

// Check URL query param
var urlQ=new URLSearchParams(window.location.search).get('q');
if(urlQ){ document.getElementById('search-inp').value=urlQ; curQuery=urlQ; document.getElementById('search-clear').classList.add('show'); }

function setFilter(btn,f){
  curFilter=f;
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  render(curQuery);
}
function clearSearch(){
  document.getElementById('search-inp').value='';
  document.getElementById('search-clear').classList.remove('show');
  curQuery='';
  render('');
}
function onSearch(val){
  curQuery=val;
  document.getElementById('search-clear').classList.toggle('show',val.length>0);
  render(val);
}

function render(q){
  var content=document.getElementById('content');
  content.innerHTML='';
  if(!q){
    // Show trending
    var ts=document.createElement('div'); ts.className='trending-section';
    var ttl=document.createElement('div'); ttl.className='section-title'; ttl.textContent='🔥 Trending Tags';
    var tg=document.createElement('div'); tg.className='tag-grid';
    TRENDING_TAGS.forEach(function(tag){
      var pill=document.createElement('div'); pill.className='tag-pill'; pill.textContent=tag;
      pill.onclick=function(){document.getElementById('search-inp').value=tag;onSearch(tag);};
      tg.appendChild(pill);
    });
    ts.appendChild(ttl); ts.appendChild(tg); content.appendChild(ts);
    // Suggested people
    var pt=document.createElement('div'); pt.className='section-title'; pt.textContent='👤 Suggested Creators';
    content.appendChild(pt);
    USERS.slice(0,4).forEach(function(u,i){ content.appendChild(makePeopleCard(u,i)); });
    return;
  }

  var ql=q.toLowerCase();
  // Find matching channel
  var matchedUser=USERS.find(function(u){ return u.name.toLowerCase().includes(ql)||u.handle.toLowerCase().includes(ql); });
  if(matchedUser && (curFilter==='all'||curFilter==='people')){
    content.appendChild(makeChannelResult(matchedUser));
  }
  // Video results
  if(curFilter==='all'||curFilter==='videos'){
    var vtitle=document.createElement('div'); vtitle.className='section-title'; vtitle.style.marginBottom='10px'; vtitle.textContent='📹 Videos';
    content.appendChild(vtitle);
    var filtered=TITLES.filter(function(t){return t.toLowerCase().includes(ql)||ql.length<2;});
    if(filtered.length===0){content.innerHTML='<div class="empty">No results for "'+q+'"</div>';return;}
    filtered.slice(0,8).forEach(function(t,i){
      var u=USERS[i%USERS.length];
      var dur=Math.floor(Math.random()*9+1)+':'+String(Math.floor(Math.random()*59)).padStart(2,'0');
      var card=document.createElement('div'); card.className='vid-result';
      card.innerHTML='<div class="vr-thumb" style="background:'+GRADS[i%GRADS.length]+'">'+u.emoji+'<div class="vr-dur">'+dur+'</div></div>'
        +'<div class="vr-info"><div class="vr-title">'+t+'</div><div class="vr-meta">'+u.name+' · '+(Math.random()*500+10).toFixed(0)+'K views · '+(Math.floor(Math.random()*30)+1)+' days ago</div></div>';
      (function(ii){card.onclick=function(){localStorage.setItem('vyb_cur',ii%12);window.location.href='watch.html';};})(i);
      content.appendChild(card);
    });
  }
  // People results
  if(curFilter==='all'||curFilter==='people'){
    var ptitle=document.createElement('div'); ptitle.className='section-title'; ptitle.style.cssText='margin-top:16px;margin-bottom:10px'; ptitle.textContent='👤 People';
    content.appendChild(ptitle);
    USERS.filter(function(u){return u.name.toLowerCase().includes(ql)||u.handle.toLowerCase().includes(ql);}).forEach(function(u,i){
      content.appendChild(makePeopleCard(u,i));
    });
  }
}

function makeChannelResult(u){
  var box=document.createElement('div'); box.className='channel-result';
  var vibing=localStorage.getItem('vibe-'+u.handle)==='1';
  var hdr=document.createElement('div'); hdr.className='ch-header';
  hdr.innerHTML='<div class="ch-big-av">'+u.emoji+'</div>'
    +'<div class="ch-meta"><div class="ch-name">'+u.name+'</div><div class="ch-handle">'+u.handle+'</div><div class="ch-stats">'+u.vibers+' Vibers · '+u.desc+'</div></div>';
  var vbtn=document.createElement('button'); vbtn.className='vibe-btn'+(vibing?' on':''); vbtn.textContent=vibing?'✓ Vibing':'+ Vibe';
  vbtn.onclick=function(){
    vibing=!vibing;
    if(vibing)localStorage.setItem('vibe-'+u.handle,'1'); else localStorage.removeItem('vibe-'+u.handle);
    vbtn.textContent=vibing?'✓ Vibing':'+ Vibe'; vbtn.classList.toggle('on',vibing);
    toast(vibing?'Now Vibing ✓':'Removed');
  };
  hdr.appendChild(vbtn); box.appendChild(hdr);
  var vgrid=document.createElement('div'); vgrid.className='ch-videos';
  (u.videos||[]).forEach(function(v,i){
    var card=document.createElement('div'); card.className='ch-vid-card';
    card.innerHTML='<div class="ch-vid-thumb" style="background:'+GRADS[i%GRADS.length]+'">'+v.e+'<div class="ch-vid-dur">'+v.dur+'</div></div>'
      +'<div class="ch-vid-title">'+v.t+'</div>';
    card.onclick=function(){localStorage.setItem('vyb_cur',i);window.location.href='watch.html';};
    vgrid.appendChild(card);
  });
  box.appendChild(vgrid);
  return box;
}

function makePeopleCard(u,i){
  var vibing=localStorage.getItem('vibe-'+u.handle)==='1';
  var card=document.createElement('div'); card.className='people-card';
  var vbtn=document.createElement('button'); vbtn.className='p-vibe'+(vibing?' on':''); vbtn.textContent=vibing?'Vibing':'+ Vibe';
  vbtn.onclick=function(e){
    e.stopPropagation();
    vibing=!vibing;
    if(vibing)localStorage.setItem('vibe-'+u.handle,'1'); else localStorage.removeItem('vibe-'+u.handle);
    vbtn.textContent=vibing?'Vibing':'+ Vibe'; vbtn.classList.toggle('on',vibing);
    toast(vibing?'Now Vibing ✓':'Removed');
  };
  card.innerHTML='<div class="p-av">'+u.emoji+'</div><div class="p-info"><div class="p-name">'+u.name+'</div><div class="p-handle">'+u.handle+' · '+u.vibers+' Vibers</div></div>';
  card.appendChild(vbtn);
  return card;
}

render(curQuery||'');
</script>
</body>
</html>
