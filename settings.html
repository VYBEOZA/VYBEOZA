<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VYBEOZA — Settings</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0a;--bg2:#111;--bg3:#1a1a1a;--bg4:#242424;--accent:#ff2d78;--accent2:#00f0c8;--accent3:#a259ff;--text:#fff;--text2:#ccc;--muted:#777;--border:#272727;--font:"DM Sans",sans-serif;--brand:"Syne",sans-serif;}
html,body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100%}
button,input,select{font-family:var(--font)}
.topbar{position:sticky;top:0;height:56px;display:flex;align-items:center;gap:10px;padding:0 16px;border-bottom:1px solid var(--border);background:var(--bg);z-index:50}
.back-btn{background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;padding:4px 10px 4px 0}
.page-title{font-family:var(--brand);font-size:20px;font-weight:700}
.body{max-width:600px;margin:0 auto;padding:16px}
.sec-title{font-size:11px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin:20px 0 8px;font-weight:600}
.item{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--bg2);border-radius:12px;margin-bottom:8px;cursor:pointer;transition:background .15s;border:none;color:var(--text);width:100%;text-align:left}
.item:hover{background:var(--bg3)}
.item-left{display:flex;align-items:center;gap:12px}
.item-ico{font-size:18px;width:26px;text-align:center}
.item-text{font-size:14px;font-weight:500}
.item-sub{font-size:11px;color:var(--muted);margin-top:2px}
.item-arrow{color:var(--muted);font-size:14px}
.toggle{width:46px;height:26px;background:var(--bg4);border-radius:13px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;border:none}
.toggle.on{background:var(--accent)}
.toggle::after{content:"";position:absolute;top:3px;left:3px;width:20px;height:20px;background:#fff;border-radius:50%;transition:transform .2s}
.toggle.on::after{transform:translateX(20px)}
/* Privacy options */
.priv-opts{background:var(--bg2);border-radius:12px;overflow:hidden;margin-bottom:8px}
.priv-opt{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;border:none;background:none;color:var(--text);width:100%;text-align:left;transition:background .15s}
.priv-opt:hover{background:var(--bg3)}
.priv-opt.on{background:var(--bg3)}
.priv-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);margin-left:auto;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.priv-opt.on .priv-check{background:var(--accent);border-color:var(--accent);color:#fff}
.priv-opt-ico{font-size:20px}
.priv-opt-txt{font-size:14px;font-weight:500}
.priv-opt-sub{font-size:11px;color:var(--muted);margin-top:1px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e1e1e;border:1px solid var(--border);padding:8px 20px;border-radius:20px;font-size:12px;opacity:0;transition:.3s;white-space:nowrap;pointer-events:none;z-index:9999}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="topbar">
  <button class="back-btn" onclick="location.href='base.html'">←</button>
  <div class="page-title">Settings & Privacy</div>
</div>
<div class="body">
  <!-- Account Privacy -->
  <div class="sec-title">Account Privacy</div>
  <div class="priv-opts">
    <button class="priv-opt on" id="po-public" onclick="setPrivacy('public')">
      <span class="priv-opt-ico">🌐</span>
      <div><div class="priv-opt-txt">Public</div><div class="priv-opt-sub">Anyone can see your Base & VISOs</div></div>
      <div class="priv-check">✓</div>
    </button>
    <button class="priv-opt" id="po-vibers" onclick="setPrivacy('vibers')">
      <span class="priv-opt-ico">👥</span>
      <div><div class="priv-opt-txt">Vibers Only</div><div class="priv-opt-sub">Only your Vibers can see your content</div></div>
      <div class="priv-check"></div>
    </button>
    <button class="priv-opt" id="po-private" onclick="setPrivacy('private')">
      <span class="priv-opt-ico">🔒</span>
      <div><div class="priv-opt-txt">Private</div><div class="priv-opt-sub">Only you can see your content. Friends need to request.</div></div>
      <div class="priv-check"></div>
    </button>
  </div>

  <!-- Appearance -->
  <div class="sec-title">Appearance</div>
  <button class="item" onclick="toggleEl('dark-toggle')">
    <div class="item-left"><span class="item-ico">🌙</span><div><div class="item-text">Dark Mode</div><div class="item-sub">Currently active</div></div></div>
    <div class="toggle on" id="dark-toggle"></div>
  </button>
  <button class="item" onclick="toast('Text size')">
    <div class="item-left"><span class="item-ico">🔤</span><div><div class="item-text">Text Size</div><div class="item-sub">Medium</div></div></div>
    <span class="item-arrow">›</span>
  </button>

  <!-- Language -->
  <div class="sec-title">Language & Region</div>
  <button class="item" onclick="toast('Language settings')">
    <div class="item-left"><span class="item-ico">🌐</span><div><div class="item-text">App Language</div><div class="item-sub">English</div></div></div>
    <span class="item-arrow">›</span>
  </button>
  <button class="item" onclick="toggleEl('autodub-toggle')">
    <div class="item-left"><span class="item-ico">🎙️</span><div><div class="item-text">Auto-Dubbing</div><div class="item-sub">Translate videos to your language automatically</div></div></div>
    <div class="toggle on" id="autodub-toggle"></div>
  </button>

  <!-- Notifications -->
  <div class="sec-title">Notifications</div>
  <button class="item" onclick="toggleEl('notif-likes')">
    <div class="item-left"><span class="item-ico">❤️</span><div><div class="item-text">Likes</div></div></div>
    <div class="toggle on" id="notif-likes"></div>
  </button>
  <button class="item" onclick="toggleEl('notif-comments')">
    <div class="item-left"><span class="item-ico">💬</span><div><div class="item-text">Comments</div></div></div>
    <div class="toggle on" id="notif-comments"></div>
  </button>
  <button class="item" onclick="toggleEl('notif-vibers')">
    <div class="item-left"><span class="item-ico">👤</span><div><div class="item-text">New Vibers</div></div></div>
    <div class="toggle on" id="notif-vibers"></div>
  </button>
  <button class="item" onclick="toggleEl('notif-money')">
    <div class="item-left"><span class="item-ico">💰</span><div><div class="item-text">Monetization Updates</div></div></div>
    <div class="toggle on" id="notif-money"></div>
  </button>

  <!-- Security -->
  <div class="sec-title">Security</div>
  <button class="item" onclick="toast('Change Password')">
    <div class="item-left"><span class="item-ico">🔑</span><div><div class="item-text">Change Password</div></div></div>
    <span class="item-arrow">›</span>
  </button>
  <button class="item" onclick="toast('Two-Factor Auth')">
    <div class="item-left"><span class="item-ico">🛡️</span><div><div class="item-text">Two-Factor Authentication</div></div></div>
    <span class="item-arrow">›</span>
  </button>

  <!-- Monetization -->
  <div class="sec-title">Monetization</div>
  <button class="item" onclick="toast('Creator Dashboard')">
    <div class="item-left"><span class="item-ico">💰</span><div><div class="item-text">Creator Dashboard</div><div class="item-sub">5,000 hrs watch time + 1,500 Vibers needed</div></div></div>
    <span class="item-arrow">›</span>
  </button>
  <button class="item" onclick="toast('Vybee Button info')">
    <div class="item-left"><span class="item-ico">🏆</span><div><div class="item-text">Vybee Button</div><div class="item-sub">VYBEOZA creator achievement award</div></div></div>
    <span class="item-arrow">›</span>
  </button>

  <!-- Account -->
  <div class="sec-title">Account</div>
  <button class="item" onclick="toast('Linked Accounts')">
    <div class="item-left"><span class="item-ico">🔗</span><div><div class="item-text">Linked Accounts</div></div></div>
    <span class="item-arrow">›</span>
  </button>
  <button class="item" onclick="toast('Download Your Data')">
    <div class="item-left"><span class="item-ico">📥</span><div><div class="item-text">Download Your Data</div></div></div>
    <span class="item-arrow">›</span>
  </button>
  <button class="item" style="color:#ff6b6b" onclick="doLogout()">
    <div class="item-left"><span class="item-ico">🚪</span><div><div class="item-text" style="color:#ff6b6b">Log Out</div></div></div>
  </button>
  <button class="item" style="color:#ff4444;margin-top:4px" onclick="toast('Account deletion coming soon')">
    <div class="item-left"><span class="item-ico">❌</span><div><div class="item-text" style="color:#ff4444">Delete Account</div></div></div>
  </button>
  <div style="height:40px"></div>
</div>
<div class="toast" id="toast"></div>
<script>
if(localStorage.getItem("vybeoza_logged_in") !== "true") window.location.href = "index.html";
function toast(t){ var x=document.getElementById("toast"); x.textContent=t; x.classList.add("show"); clearTimeout(window._tt); window._tt=setTimeout(function(){ x.classList.remove("show"); },1600); }
function doLogout(){ localStorage.removeItem("vybeoza_logged_in"); window.location.href="index.html"; }
function toggleEl(id){ var el=document.getElementById(id); el.classList.toggle("on"); toast(el.classList.contains("on") ? "Enabled" : "Disabled"); }
var currentPrivacy = "public";
function setPrivacy(p){
  currentPrivacy = p;
  ["public","vibers","private"].forEach(function(v){
    var el = document.getElementById("po-" + v);
    el.classList.toggle("on", v === p);
    el.querySelector(".priv-check").textContent = v === p ? "✓" : "";
  });
  toast("Privacy: " + (p === "public" ? "Public" : p === "vibers" ? "Vibers Only" : "Private"));
}
</script>
</body>
</html>
