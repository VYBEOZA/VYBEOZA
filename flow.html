<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>VYBEOZA - Flow</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#000;--bg2:#111;--bg3:#1a1a1a;--accent:#ff2d78;--accent2:#00f0c8;--accent3:#a259ff;--text:#fff;--muted:#aaa;--border:#2a2a2a;--font:"DM Sans",sans-serif;--brand:"Syne",sans-serif}
html,body{height:100%;background:#000;color:var(--text);font-family:var(--font);overflow:hidden}
button{font-family:var(--font);cursor:pointer}

/* TOPBAR */
.topbar{position:fixed;top:0;left:0;right:0;height:48px;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:0 14px;background:linear-gradient(to bottom,rgba(0,0,0,.7),transparent)}
.tb-left{display:flex;gap:16px}
.ftab{background:none;border:none;color:rgba(255,255,255,.6);font-size:14px;font-weight:600;padding-bottom:2px;border-bottom:2px solid transparent;transition:all .2s}
.ftab.on{color:#fff;border-bottom-color:#fff}
.tb-right{display:flex;gap:4px}
.ico-btn{background:none;border:none;color:#fff;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px}

/* FLOW CONTAINER */
.flow-wrap{height:100vh;overflow-y:scroll;scroll-snap-type:y mandatory;scrollbar-width:none}
.flow-wrap::-webkit-scrollbar{display:none}

/* SLIDE */
.fslide{height:100vh;scroll-snap-align:start;position:relative;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.fsbg{position:absolute;inset:0;opacity:.65}
.fs-emoji{position:relative;z-index:1;font-size:70px;pointer-events:none;user-select:none}
.fplay{position:absolute;width:56px;height:56px;background:rgba(255,45,120,.85);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;z-index:3;border:none;color:#fff;transition:transform .2s,opacity .2s}
.fplay:active{transform:scale(.9)}
.fplay.hidden{opacity:0;pointer-events:none}

/* RIGHT ACTIONS */
.f-acts{position:absolute;right:12px;bottom:90px;display:flex;flex-direction:column;gap:16px;align-items:center;z-index:5}
.fact{display:flex;flex-direction:column;align-items:center;gap:3px}
.fact-ico{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.15);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;font-size:19px;border:1px solid rgba(255,255,255,.2);transition:all .2s;cursor:pointer;-webkit-tap-highlight-color:transparent}
.fact-ico:active{transform:scale(.9)}
.fact-ico.liked{background:var(--accent);border-color:var(--accent)}
.fact-ico.saved2{background:var(--accent2);border-color:var(--accent2)}
.fact-ico.reposted{background:var(--accent3);border-color:var(--accent3)}
.fact-lbl{font-size:10px;color:rgba(255,255,255,.85);font-weight:500;text-align:center}

/* INFO */
.f-info{position:absolute;bottom:14px;left:12px;right:62px;z-index:5}
.f-user-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.f-av{width:36px;height:36px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:16px;border:2px solid var(--accent);flex-shrink:0;cursor:pointer}
.f-uname{font-size:13px;font-weight:600;color:#fff;cursor:pointer}
.f-vibe-btn{background:none;border:1.5px solid #fff;color:#fff;padding:3px 10px;border-radius:16px;font-size:10px;margin-left:6px;transition:all .2s}
.f-vibe-btn.on{background:#fff;color:#000}
.f-cap{font-size:12px;color:rgba(255,255,255,.9);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.f-music{display:flex;align-items:center;gap:6px;margin-top:6px}
.f-music-ico{font-size:12px;animation:spin 3s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.f-music-txt{font-size:10px;color:rgba(255,255,255,.7)}

/* AD SLIDE */
.ad-slide .fsbg{opacity:.3}
.ad-badge{position:absolute;top:60px;left:12px;background:rgba(0,0,0,.8);color:#aaa;font-size:10px;padding:3px 10px;border-radius:16px;border:1px solid #555;z-index:5}
.ad-skip{position:absolute;bottom:100px;right:12px;background:rgba(0,0,0,.8);color:#fff;border:1px solid #555;padding:6px 14px;border-radius:16px;font-size:11px;z-index:5}

/* BOTTOM NAV */
.bnav{display:none;position:fixed;bottom:0;left:0;right:0;height:56px;background:rgba(0,0,0,.85);border-top:1px solid rgba(255,255,255,.1);z-index:100;justify-content:space-around;align-items:center}
.bn-btn{background:none;border:none;color:rgba(255,255,255,.6);display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 8px;text-decoration:none}
.bn-btn.on{color:#fff}
.bn-ico{font-size:19px;line-height:1}
.bn-lbl{font-size:7px;letter-spacing:.5px;text-transform:uppercase;font-weight:500}
.bn-fab{width:42px;height:42px;background:linear-gradient(135deg,var(--accent),var(--accent3));border:none;border-radius:50%;color:#fff;font-size:20px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px #ff2d7840}

/* SHEET */
.sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:flex-end;justify-content:center}
.sheet-bg.open{display:flex}
.sheet-box{background:#1a1a1a;border-radius:18px 18px 0 0;padding:18px;width:100%;max-width:480px}
.sheet-title{font-size:15px;font-weight:600;text-align:center;margin-bottom:14px;color:#fff}
.sheet-row{display:flex;align-items:center;gap:10px;padding:10px;border-radius:8px;font-size:13px;border:none;background:none;color:#fff;width:100%;text-align:left}
.sheet-row:hover{background:#2a2a2a}
.sheet-cancel{width:100%;background:#2a2a2a;border:none;color:#fff;padding:12px;border-radius:10px;font-size:13px;font-weight:500;margin-top:7px}
.share-apps{display:flex;gap:12px;overflow-x:auto;scrollbar-width:none;margin-bottom:14px}
.share-apps::-webkit-scrollbar{display:none}
.sapp{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;flex-shrink:0}
.sapp-ico{width:48px;height:48px;border-radius:50%;background:#2a2a2a;display:flex;align-items:center;justify-content:center;font-size:22px}
.sapp-lbl{font-size:9px;color:#aaa}
.link-row{display:flex;gap:7px}
.link-inp{flex:1;background:#2a2a2a;border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:#888;font-size:11px;outline:none}
.copy-btn{background:var(--accent);border:none;color:#fff;padding:8px 14px;border-radius:8px;font-size:11px;font-weight:500}

/* TOAST */
.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:#1e1e1e;border:1px solid #333;padding:7px 18px;border-radius:18px;font-size:12px;opacity:0;transition:.3s;pointer-events:none;z-index:999;white-space:nowrap;color:#fff}
.toast.show{opacity:1}

@media(max-width:768px){.bnav{display:flex}}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="tb-left">
    <a href="flash.html" class="ftab">Flash</a>
    <span class="ftab on">Flow</span>
  </div>
  <div class="tb-right">
    <a href="explore.html" class="ico-btn">🔎</a>
  </div>
</div>

<!-- FLOW -->
<div class="flow-wrap" id="flow-wrap"></div>

<!-- BOTTOM NAV -->
<div class="bnav">
  <a class="bn-btn" href="flash.html"><span class="bn-ico">🏡</span><span class="bn-lbl">Flash</span></a>
  <a class="bn-btn on" href="flow.html"><span class="bn-ico">📽️</span><span class="bn-lbl">Flow</span></a>
  <a class="bn-btn" href="post.html"><div class="bn-fab">＋</div></a>
  <a class="bn-btn" href="hypo.html"><span class="bn-ico">💬</span><span class="bn-lbl">Hypo</span></a>
  <a class="bn-btn" href="base.html"><span class="bn-ico">👤</span><span class="bn-lbl">Base</span></a>
</div>

<!-- REPORT SHEET -->
<div class="sheet-bg" id="sheet-report">
  <div class="sheet-box">
    <div class="sheet-title">Report</div>
    <button class="sheet-row" onclick="reportDone('Spam')">🚫 Spam or misleading</button>
    <button class="sheet-row" onclick="reportDone('Harassment')">😡 Harassment</button>
    <button class="sheet-row" onclick="reportDone('Child Safety')">🛡️ Child abuse / safety</button>
    <button class="sheet-row" onclick="reportDone('Copyright')">©️ Copyright</button>
    <button class="sheet-row" onclick="reportDone('Violence')">🩸 Violence</button>
    <button class="sheet-cancel" onclick="document.getElementById('sheet-report').classList.remove('open')">Cancel</button>
  </div>
</div>

<!-- SHARE SHEET -->
<div class="sheet-bg" id="sheet-share">
  <div class="sheet-box">
    <div class="sheet-title">Share</div>
    <div class="share-apps">
      <div class="sapp" onclick="toast('Sent via Hypo!');closeShare()"><div class="sapp-ico">💬</div><div class="sapp-lbl">Hypo</div></div>
      <div class="sapp" onclick="toast('Added to Prefo!');closeShare()"><div class="sapp-ico">✨</div><div class="sapp-lbl">Prefo</div></div>
      <div class="sapp" onclick="toast('Shared!');closeShare()"><div class="sapp-ico">📱</div><div class="sapp-lbl">WhatsApp</div></div>
      <div class="sapp" onclick="toast('Shared!');closeShare()"><div class="sapp-ico">✈️</div><div class="sapp-lbl">Telegram</div></div>
    </div>
    <div class="link-row">
      <input class="link-inp" id="share-link" readonly value="https://vybeoza.github.io/VYBEOZA/flow.html">
      <button class="copy-btn" onclick="copyLink()">Copy</button>
    </div>
    <button class="sheet-cancel" onclick="closeShare()">Cancel</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var user = null;
try { user = JSON.parse(localStorage.getItem('vyb_user')); } catch(e){}
if(!user){ window.location.href = 'index.html'; }

var USERS = [{name:'Krishna',handle:'@krishna_vibe',emoji:'🎸'},{name:'Suryansh',handle:'@suryansh_gg',emoji:'🎮'},{name:'Arnav',handle:'@arnav_creates',emoji:'🏄'},{name:'Riya',handle:'@riya.art',emoji:'🎨'},{name:'Dev',handle:'@dev_rockets',emoji:'🚀'},{name:'Meera',handle:'@meera.flow',emoji:'🌸'}];
var TITLES = ['That feeling when the vibe hits just right ✨','Best moments with the crew 🔥','New day new VISO 🎯','Real talk: life is a vibe 💫','Creating something special 🎪','Varanasi never misses 🌟','No filter needed 💪','This took 3 hours to perfect 🎬','Late night studio session 🎵','Morning walk vibes ☀️'];
var GRADS = ['linear-gradient(135deg,#ff2d78,#a259ff)','linear-gradient(135deg,#00f0c8,#a259ff)','linear-gradient(135deg,#ff2d78,#00f0c8)','linear-gradient(45deg,#a259ff,#ff2d78)','linear-gradient(90deg,#00f0c8,#ff2d78)'];
var LIKES = [847,2341,156,4892,723,1205,389,2678,1034,3210];

function toast(msg){
  var el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show');
  clearTimeout(window._tt); window._tt=setTimeout(function(){el.classList.remove('show');},1800);
}
function closeShare(){ document.getElementById('sheet-share').classList.remove('open'); }
function copyLink(){ navigator.clipboard.writeText(document.getElementById('share-link').value).then(function(){toast('Copied!');}).catch(function(){toast('Copied!');}); }
function reportDone(r){ toast('Reported: '+r+' ✓'); document.getElementById('sheet-report').classList.remove('open'); }

function buildFlow(){
  var wrap = document.getElementById('flow-wrap');
  wrap.innerHTML = '';
  var list = [];
  for(var i=0;i<12;i++) list.push(i);
  // Insert ad at position 5 and 10
  list.forEach(function(i, pos){
    var isAd = (pos===5||pos===10);
    var u = USERS[i%USERS.length];
    var l = LIKES[i%LIKES.length];
    var grad = GRADS[i%GRADS.length];
    var slide = document.createElement('div');
    slide.className = 'fslide' + (isAd?' ad-slide':'');
    var bg = document.createElement('div');
    bg.className = 'fsbg';
    bg.style.background = grad;
    slide.appendChild(bg);
    if(isAd){
      slide.innerHTML += '<div class="fs-emoji">🎯</div>';
      var badge = document.createElement('div'); badge.className='ad-badge'; badge.textContent='Sponsored';
      var adInfo = document.createElement('div');
      adInfo.style.cssText='position:absolute;bottom:100px;left:12px;right:60px;z-index:5;color:#fff';
      adInfo.innerHTML='<div style="font-size:16px;font-weight:700;margin-bottom:4px">VYBEOZA Premium</div><div style="font-size:12px;opacity:.8">Go ad-free. Unlock all features.</div>';
      var skipBtn = document.createElement('button'); skipBtn.className='ad-skip'; skipBtn.textContent='Skip →';
      skipBtn.onclick=function(){toast('Ad skipped');};
      slide.appendChild(badge); slide.appendChild(adInfo); slide.appendChild(skipBtn);
    } else {
      var emoji = document.createElement('div'); emoji.className='fs-emoji'; emoji.textContent=u.emoji;
      slide.appendChild(emoji);
      var playBtn = document.createElement('button'); playBtn.className='fplay';
      playBtn.textContent='▶'; playBtn.id='fplay'+i;
      playBtn.onclick=(function(btn){ return function(){ btn.classList.toggle('hidden'); toast('Playing...'); }; })(playBtn);
      slide.appendChild(playBtn);
      // Actions (right side) - NO duplicate save
      var acts = document.createElement('div'); acts.className='f-acts';
      // Like
      var likeFact = document.createElement('div'); likeFact.className='fact';
      var likeIco = document.createElement('div'); likeIco.className='fact-ico';
      likeIco.textContent='❤️';
      var likeLbl = document.createElement('div'); likeLbl.className='fact-lbl'; likeLbl.textContent=l.toLocaleString();
      (function(ico, origL, lbl){
        ico.onclick=function(){
          ico.classList.toggle('liked');
          lbl.textContent=ico.classList.contains('liked')?(origL+1).toLocaleString():origL.toLocaleString();
          if(ico.classList.contains('liked')) toast('Liked ❤️');
        };
      })(likeIco,l,likeLbl);
      likeFact.appendChild(likeIco); likeFact.appendChild(likeLbl);
      // Comment
      var cmtFact = document.createElement('div'); cmtFact.className='fact';
      var cmtIco = document.createElement('div'); cmtIco.className='fact-ico'; cmtIco.textContent='💬';
      cmtIco.onclick=function(){toast('Comments');};
      var cmtLbl = document.createElement('div'); cmtLbl.className='fact-lbl'; cmtLbl.textContent=Math.floor(l*.06);
      cmtFact.appendChild(cmtIco); cmtFact.appendChild(cmtLbl);
      // Save (only one)
      var saveFact = document.createElement('div'); saveFact.className='fact';
      var saveIco = document.createElement('div'); saveIco.className='fact-ico'; saveIco.textContent='🔖';
      saveIco.onclick=function(){ saveIco.classList.toggle('saved2'); toast(saveIco.classList.contains('saved2')?'Saved 🔖':'Removed'); };
      var saveLbl = document.createElement('div'); saveLbl.className='fact-lbl'; saveLbl.textContent='Save';
      saveFact.appendChild(saveIco); saveFact.appendChild(saveLbl);
      // Repost
      var rpFact = document.createElement('div'); rpFact.className='fact';
      var rpIco = document.createElement('div'); rpIco.className='fact-ico'; rpIco.textContent='🔁';
      rpIco.onclick=function(){ rpIco.classList.toggle('reposted'); toast(rpIco.classList.contains('reposted')?'Reposted 🔁':'Removed'); };
      var rpLbl = document.createElement('div'); rpLbl.className='fact-lbl'; rpLbl.textContent='Repost';
      rpFact.appendChild(rpIco); rpFact.appendChild(rpLbl);
      // Share
      var shrFact = document.createElement('div'); shrFact.className='fact';
      var shrIco = document.createElement('div'); shrIco.className='fact-ico'; shrIco.textContent='↗';
      shrIco.onclick=function(){ document.getElementById('sheet-share').classList.add('open'); };
      var shrLbl = document.createElement('div'); shrLbl.className='fact-lbl'; shrLbl.textContent='Share';
      shrFact.appendChild(shrIco); shrFact.appendChild(shrLbl);
      // Download
      var dlFact = document.createElement('div'); dlFact.className='fact';
      var dlIco = document.createElement('div'); dlIco.className='fact-ico'; dlIco.textContent='⬇️';
      dlIco.onclick=function(){ toast('Downloading ⬇️'); };
      var dlLbl = document.createElement('div'); dlLbl.className='fact-lbl'; dlLbl.textContent='Save';
      dlFact.appendChild(dlIco); dlFact.appendChild(dlLbl);
      // 3-dot
      var dotFact = document.createElement('div'); dotFact.className='fact';
      var dotIco = document.createElement('div'); dotIco.className='fact-ico'; dotIco.textContent='⋯';
      dotIco.onclick=function(){ document.getElementById('sheet-report').classList.add('open'); };
      dotFact.appendChild(dotIco);
      acts.appendChild(likeFact); acts.appendChild(cmtFact); acts.appendChild(saveFact);
      acts.appendChild(rpFact); acts.appendChild(shrFact); acts.appendChild(dotFact);
      slide.appendChild(acts);
      // Info
      var info = document.createElement('div'); info.className='f-info';
      var urow = document.createElement('div'); urow.className='f-user-row';
      var fav = document.createElement('div'); fav.className='f-av'; fav.textContent=u.emoji;
      var fun = document.createElement('span'); fun.className='f-uname'; fun.textContent=u.name;
      var vbtn = document.createElement('button'); vbtn.className='f-vibe-btn'; vbtn.textContent='+ Vibe';
      vbtn.onclick=function(){vbtn.classList.toggle('on');vbtn.textContent=vbtn.classList.contains('on')?'Vibing':'+ Vibe';toast(vbtn.classList.contains('on')?'Now Vibing ✓':'Removed');};
      urow.appendChild(fav); urow.appendChild(fun); urow.appendChild(vbtn);
      var cap = document.createElement('div'); cap.className='f-cap'; cap.textContent=TITLES[i%TITLES.length];
      var mus = document.createElement('div'); mus.className='f-music';
      mus.innerHTML='<span class="f-music-ico">🎵</span><span class="f-music-txt">Original audio — '+u.name+'</span>';
      info.appendChild(urow); info.appendChild(cap); info.appendChild(mus);
      slide.appendChild(info);
    }
    wrap.appendChild(slide);
  });
}

document.getElementById('sheet-share').onclick=function(e){if(e.target===this)closeShare();};
document.getElementById('sheet-report').onclick=function(e){if(e.target===this)this.classList.remove('open');};
buildFlow();
</script>
</body>
</html>
